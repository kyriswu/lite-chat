<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lite Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #252525; --border: #333;
    --accent: #7c6aff; --accent2: #a78bfa; --text: #e5e5e5; --text2: #999;
    --user-bg: #2a2250; --ai-bg: #171717; --danger: #ef4444; --ok: #22c55e;
    --sidebar-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }
  .hidden { display: none !important; }

  #auth-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .auth-box { width: min(420px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: grid; gap: 16px; }
  .auth-title { color: var(--accent2); font-size: 24px; font-weight: 800; }
  .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 8px; padding: 4px; }
  .tab { min-width: 0; border: 0; background: transparent; color: var(--text2); padding: 9px; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-size: inherit; font-weight: 500; transition: background 0.15s, color 0.15s; }
  .tab.active { background: var(--accent); color: white; }
  .form { display: grid; gap: 10px; }
  .field { display: grid; gap: 6px; }
  label { color: var(--text2); font-size: 12px; }
  .input, select, textarea { width: 100%; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; }
  .input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .primary, .btn { background: var(--accent); color: white; border: 0; border-radius: 8px; padding: 10px 14px; }
  .secondary { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
  .secondary.active { background: var(--surface2); color: var(--accent2); border-color: var(--accent); }
  .danger { color: var(--danger); }
  #auth-status, #status { min-height: 18px; color: var(--danger); font-size: 13px; }

  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9; }
  #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #close-sidebar { display: none; }
  .sidebar-header { padding: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); gap: 8px; }
  .sidebar-title { color: var(--accent2); font-weight: 800; }
  #new-chat-btn { white-space: nowrap; }
  #conversation-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conversation { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; color: var(--text2); }
  .conversation:hover { background: var(--surface2); color: var(--text); }
  .conversation.active { background: var(--user-bg); color: var(--accent2); }
  .conversation-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .icon-btn { background: transparent; color: var(--text2); border: 0; border-radius: 6px; padding: 5px 7px; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  #settings-panel { border-top: 1px solid var(--border); padding: 12px; display: grid; gap: 9px; }
  #user-line { color: var(--text2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #topbar { height: 52px; display: flex; align-items: center; gap: 10px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #chat-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 650; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 0; }
  #empty-state { height: 100%; display: grid; place-items: center; color: var(--text2); }
  .msg-row { max-width: 820px; margin: 0 auto 8px; padding: 0 20px; display: flex; flex-direction: column; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.assistant { align-items: flex-start; }
  .msg-label { font-size: 11px; color: var(--text2); margin: 0 4px 4px; }
  .bubble { max-width: 90%; padding: 12px 16px; border-radius: 16px; line-height: 1.65; font-size: 14.5px; word-break: break-word; }
  .user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble img { max-width: 100%; max-height: 320px; display: block; border-radius: 10px; margin: 6px 0; }
  .bubble p { margin: 0 0 .6em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble pre { background: #161616; border: 1px solid var(--border); border-radius: 10px; padding: 14px; overflow-x: auto; margin: .6em 0; position: relative; }
  .bubble code:not(pre code) { background: #2d2d2d; border-radius: 4px; padding: 2px 5px; color: #e2b96b; }
  .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 5px; }
  .cursor { display: inline-block; width: 8px; height: 1em; background: var(--accent2); animation: blink .8s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }

  #image-previews { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px 0; max-width: 820px; margin: 0 auto; width: 100%; }
  .img-preview-wrap { position: relative; width: 72px; height: 72px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .remove-img { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 50%; border: 0; background: rgba(0,0,0,.75); color: white; }

  #input-bar { border-top: 1px solid var(--border); padding: 12px 16px 16px; }
  #input-wrap { max-width: 820px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; }
  #msg-input { background: transparent; border: 0; color: var(--text); resize: none; padding: 14px 16px 6px; min-height: 56px; max-height: 200px; outline: none; }
  #input-actions { display: flex; align-items: center; gap: 6px; padding: 6px 10px 10px; }
  #send-btn { margin-left: auto; width: 36px; height: 36px; border-radius: 10px; border: 0; background: var(--accent); color: white; font-size: 18px; }
  #send-btn:disabled { opacity: .45; cursor: not-allowed; }
  .hint { color: var(--text2); font-size: 11px; text-align: center; margin-top: 6px; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 20; align-items: center; justify-content: center; padding: 16px; }
  .modal.open { display: flex; }
  .modal-box { width: min(520px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: grid; gap: 12px; }
  .modal-box.wide { width: min(760px, 100%); max-height: min(90vh, 900px); display: flex; flex-direction: column; gap: 12px; }
  .modal-title { font-size: 16px; font-weight: 800; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .admin-provider-list { display: grid; gap: 8px; max-height: 260px; overflow-y: auto; }
  .admin-provider-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .admin-provider-name { font-weight: 650; }
  .admin-provider-meta { color: var(--text2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .admin-provider-actions { display: flex; gap: 6px; }
  /* Skill 选择器 */
  .skill-btn { background: none; border: none; cursor: pointer; padding: 0 6px; color: var(--text2); font-size: 18px; line-height: 1; transition: color .15s; flex-shrink: 0; }
  .skill-btn:hover, .skill-btn.active { color: var(--accent); }
  .skill-picker { position: absolute; bottom: 100%; left: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 220px; max-height: 280px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,.3); z-index: 100; }
  .skill-picker.hidden { display: none; }
  .skill-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .skill-item:hover, .skill-item.active { background: var(--surface3, #2a2a3a); }
  .skill-item-icon { font-size: 20px; flex-shrink: 0; }
  .skill-item-text { flex: 1; min-width: 0; }
  .skill-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .skill-item-desc { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .skill-none { padding: 6px 10px; font-size: 12px; color: var(--text2); text-align: center; }
  /* 管理员 skill 列表 */
  .admin-skill-list { display: grid; gap: 8px; max-height: 260px; overflow-y: auto; }
  .admin-skill-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .admin-skill-row.has-files { cursor: pointer; }
  .admin-skill-name { font-weight: 650; }
  .admin-skill-meta { color: var(--text2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .admin-skill-actions { display: flex; gap: 6px; }
  .skill-files-badge { font-size: 12px; padding: 4px 7px; color: var(--accent2); background: var(--surface); border: 1px solid var(--border); border-radius: 7px; }
  .skill-files-list { grid-column: 1 / -1; border-top: 1px solid var(--border); padding-top: 8px; display: grid; gap: 5px; cursor: default; }
  .skill-file-item { display: flex; justify-content: space-between; gap: 12px; color: var(--text2); font-size: 12px; }
  .skill-file-path { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #admin-pane-providers, #admin-pane-skills { flex: 1; min-height: 0; overflow-y: auto; padding-right: 2px; }
  .clawhub-attachment-preview { color: var(--text2); font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .clawhub-result-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; cursor:pointer; border-bottom:1px solid var(--border); font-size:13px; transition:background .15s; }
  .clawhub-result-item:last-child { border-bottom:none; }
  .clawhub-result-item:hover { background:var(--surface3,#2a2a3a); }
  .clawhub-result-slug { font-weight:600; color:var(--accent); margin-right:8px; flex-shrink:0; }
  .clawhub-result-desc { color:var(--text2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .clawhub-import-btn { font-size:11px; padding:3px 8px; background:var(--accent); color:#fff; border:none; border-radius:5px; cursor:pointer; flex-shrink:0; margin-left:8px; }
  .clawhub-import-btn:hover { opacity:0.85; }
  .model-select-wrapper {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .model-select-wrapper select.input {
    flex: 1;
    min-width: 0;
  }

  @media (max-width: 720px) {
    #sidebar-overlay.show { display: block; }
    #sidebar { position: fixed; inset: 0 auto 0 0; transform: translateX(-100%); transition: transform .18s; z-index: 10; box-shadow: 4px 0 24px rgba(0,0,0,.4); }
    #sidebar.open { transform: translateX(0); }
    #close-sidebar { display: inline-flex; }
    .bubble { max-width: 96%; }
    #topbar { padding: 0 10px; }
  }
</style>
</head>
<body>
<section id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">Lite Chat</div>
    <div class="tabs">
      <button class="tab active" id="login-tab">登录</button>
      <button class="tab" id="register-tab">注册</button>
    </div>
    <form class="form" id="auth-form">
      <div class="field"><label>邮箱</label><input class="input" id="auth-email" type="email" autocomplete="email" required /></div>
      <div class="field hidden" id="name-field"><label>显示名</label><input class="input" id="auth-name" type="text" autocomplete="name" /></div>
      <div class="field"><label>密码</label><input class="input" id="auth-password" type="password" autocomplete="current-password" required /></div>
      <button class="primary" id="auth-submit" type="submit">登录</button>
      <div id="auth-status"></div>
    </form>
  </div>
</section>

<div id="app" class="hidden">
  <div id="sidebar-overlay"></div>
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Lite Chat</span>
      <button class="icon-btn" id="close-sidebar" title="关闭">✕</button>
      <button class="secondary" id="new-chat-btn">新对话</button>
    </div>
    <div id="conversation-list"></div>
    <div id="settings-panel">
      <div id="user-line"></div>
      <label>模型</label>
      <select id="model-select"><option value="">加载中...</option></select>
      <button class="secondary hidden" id="admin-btn">管理员</button>
      <button class="secondary" id="logout-btn">退出登录</button>
      <div id="status"></div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <button class="icon-btn" id="toggle-sidebar" title="侧栏">☰</button>
      <span id="chat-title">新对话</span>
      <button class="secondary" id="sys-prompt-btn">系统提示</button>
    </div>
    <div id="messages"><div id="empty-state">开始对话</div></div>
    <div id="image-previews"></div>
    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="输入消息，Shift+Enter 换行，支持粘贴图片"></textarea>
        <div id="input-actions">
          <div style="position:relative">
            <div class="skill-picker hidden" id="skill-picker"></div>
            <button class="skill-btn" id="skill-btn" title="选择技能">⚡</button>
          </div>
          <button class="icon-btn" id="upload-btn" title="上传图片">🖼</button>
          <input type="file" id="file-input" accept="image/*" multiple hidden />
          <button class="icon-btn danger" id="clear-btn" title="删除对话">🗑</button>
          <button id="send-btn" title="发送">↑</button>
        </div>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </main>
</div>

<div class="modal" id="sys-modal">
  <div class="modal-box">
    <div class="modal-title">系统提示词</div>
    <textarea id="sys-prompt-input" rows="6" placeholder="你是一个有用的助手"></textarea>
    <div class="modal-actions">
      <button class="secondary" id="sys-cancel">取消</button>
      <button class="primary" id="sys-save">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="admin-modal">
  <div class="modal-box wide">
    <div class="modal-title" style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span>管理员</span>
      <button type="button" id="admin-modal-close" title="关闭" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;">×</button>
    </div>
    <div class="tabs" style="margin-bottom:12px;flex-shrink:0;">
      <button class="tab active" id="admin-tab-providers">供应商</button>
      <button class="tab" id="admin-tab-skills">技能</button>
    </div>
    <div id="admin-pane-providers">
      <div class="admin-provider-list" id="admin-provider-list"></div>
      <form class="form" id="admin-provider-form">
        <input type="hidden" id="admin-provider-id" />
        <div class="field"><label>名称</label><input class="input" id="admin-provider-name" required /></div>
        <div class="field"><label>Base URL</label><input class="input" id="admin-provider-base-url" placeholder="https://api.openai.com" required /></div>
        <div class="field"><label>API Key</label><input class="input" id="admin-provider-api-key" type="password" placeholder="留空保持不变，输入新值替换" /></div>
        <div class="field">
          <label>默认模型</label>
          <div class="model-select-wrapper" id="admin-model-select-wrapper">
            <select class="input" id="admin-provider-default-model-select" style="flex:1;">
              <option value="">-- 请先点击刷新加载模型 --</option>
            </select>
            <button class="secondary" type="button" id="admin-load-models-btn" title="从 Base URL 加载模型列表" style="white-space:nowrap;">⟳ 刷新</button>
          </div>
          <input class="input" id="admin-provider-default-model" placeholder="或手动输入模型名称" style="margin-top:6px;" />
          <div id="admin-model-load-status" style="font-size:12px; color:var(--text2); margin-top:4px; display:none;"></div>
        </div>
        <div class="modal-actions">
          <button class="secondary" id="admin-provider-reset" type="button">清空</button>
          <button class="primary" type="submit">保存全局 Provider</button>
        </div>
      </form>
    </div>
    <div id="admin-pane-skills" class="hidden">
      <!-- ClawHub 在线导入 -->
      <div class="clawhub-import" style="margin-bottom:12px; display:flex; flex-direction:column; gap:8px;">
        <div style="font-size:12px; font-weight:600; color:var(--text2);">⚡ 从 ClawHub 导入技能</div>
        <div style="display:flex; gap:6px;">
          <input class="input" id="clawhub-search-input" placeholder="搜索 ClawHub 技能（如：翻译、写作）" style="flex:1; font-size:13px;" />
          <button class="secondary" id="clawhub-search-btn" style="font-size:12px; padding:0 12px;">搜索</button>
        </div>
        <div id="clawhub-results" class="hidden" style="background:var(--surface2); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto;"></div>
      </div>
      <div class="admin-skill-list" id="admin-skill-list"></div>
      <form class="form" id="admin-skill-form">
        <input type="hidden" id="admin-skill-id" />
        <input type="hidden" id="admin-skill-clawhub-slug" />
        <div class="field"><label>图标 Emoji</label><input class="input" id="admin-skill-icon" value="🤖" maxlength="4" style="width:60px" /></div>
        <div class="field"><label>名称</label><input class="input" id="admin-skill-name" required /></div>
        <div class="field"><label>描述（一句话）</label><input class="input" id="admin-skill-desc" /></div>
        <div class="clawhub-attachment-preview hidden" id="clawhub-attachment-preview"></div>
        <div class="field"><label>System Prompt</label><textarea class="input" id="admin-skill-prompt" rows="4" required style="resize:vertical"></textarea></div>
        <div class="field"><label>排序</label><input class="input" id="admin-skill-order" type="number" value="0" /></div>
        <div class="field"><label><input type="checkbox" id="admin-skill-active" checked /> 启用</label></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
          <button class="secondary" id="admin-skill-reset" type="button">清空</button>
          <button class="btn" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const LS = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v) } catch { return fallback } },
  set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
  del: (key) => localStorage.removeItem(key),
}

marked.setOptions({ breaks: true, gfm: true })
const renderer = new marked.Renderer()
renderer.code = ({ text, lang }) => {
  const highlighted = lang && hljs.getLanguage(lang) ? hljs.highlight(text, { language: lang }).value : hljs.highlightAuto(text).value
  return `<pre><button class="copy-btn" onclick="copyCode(this)">复制</button><code class="hljs language-${escAttr(lang || '')}">${highlighted}</code></pre>`
}
marked.use({ renderer })

let authToken = LS.get('authToken', '')
let currentUser = null
let providers = []
let conversations = []
let currentConversation = null
let messages = []
let pendingImages = []
let isStreaming = false
let authMode = 'login'
let adminProviders = []
let skills = []
let adminSkills = []
let adminSkillFiles = {}
let activeSkillId = null

const $ = (id) => document.getElementById(id)
const refs = {
  authScreen: $('auth-screen'), app: $('app'), authForm: $('auth-form'), authStatus: $('auth-status'),
  loginTab: $('login-tab'), registerTab: $('register-tab'), nameField: $('name-field'), authSubmit: $('auth-submit'),
  list: $('conversation-list'), title: $('chat-title'), messages: $('messages'), input: $('msg-input'),
  send: $('send-btn'), previews: $('image-previews'), model: $('model-select'),
  status: $('status'), userLine: $('user-line'), sidebar: $('sidebar'), sysModal: $('sys-modal'),
  sysInput: $('sys-prompt-input'),
  adminBtn: $('admin-btn'), adminModal: $('admin-modal'), adminProviderList: $('admin-provider-list'),
  adminProviderForm: $('admin-provider-form'), skillBtn: $('skill-btn'), skillPicker: $('skill-picker'),
  adminSkillList: $('admin-skill-list'), adminSkillForm: $('admin-skill-form'),
  adminTabProviders: $('admin-tab-providers'), adminTabSkills: $('admin-tab-skills'),
  adminPaneProviders: $('admin-pane-providers'), adminPaneSkills: $('admin-pane-skills'),
}

async function api(path, options = {}) {
  const headers = { ...(options.headers || {}) }
  const isForm = options.body instanceof FormData
  if (!isForm) headers['Content-Type'] = 'application/json'
  if (authToken) headers.Authorization = `Bearer ${authToken}`
  const res = await fetch(path, { ...options, headers })
  if (!res.ok) {
    let message = `HTTP ${res.status}`
    try { message = (await res.json()).error || message } catch {}
    throw new Error(message)
  }
  if (res.status === 204) return null
  return res.json()
}

function setStatus(text, danger = true) {
  refs.status.textContent = text || ''
  refs.status.style.color = danger ? 'var(--danger)' : 'var(--ok)'
}

function setAuthMode(mode) {
  authMode = mode
  refs.loginTab.classList.toggle('active', mode === 'login')
  refs.registerTab.classList.toggle('active', mode === 'register')
  refs.nameField.classList.toggle('hidden', mode === 'login')

  refs.authStatus.textContent = ''
}

refs.registerTab.onclick = () => setAuthMode('register')

refs.authForm.onsubmit = async (event) => {

    password: $('auth-password').value,
    displayName: $('auth-name').value.trim(),
  }

    authToken = data.token

async function enterApp() {
  refs.authScreen.classList.add('hidden')
  refs.app.classList.remove('hidden')

  refs.adminBtn.classList.toggle('hidden', !currentUser?.isAdmin)

  if (activeId && conversations.some((c) => c.id === activeId)) await switchConversation(activeId)

async function loadSkills() {

function renderSkillPicker() {

  const none = document.createElement('div')
  none.className = `skill-item${activeSkillId ? '' : ' active'}`
  none.innerHTML = '<div class="skill-item-icon">∅</div><div class="skill-item-text"><div class="skill-item-name">无技能</div><div class="skill-item-desc">使用当前对话系统提示词</div></div>'
  none.onclick = () => {
    activeSkillId = null
    refs.skillPicker.classList.add('hidden')

  }
  refs.skillPicker.appendChild(none)

  if (!skills.length) {
    const empty = document.createElement('div')
    empty.className = 'skill-none'
    empty.textContent = '暂无可用技能'
    refs.skillPicker.appendChild(empty)

    item.className = `skill-item${activeSkillId === skill.id ? ' active' : ''}`

      <div class="skill-item-icon">${escHtml(skill.icon || '🤖')}</div>
      <div class="skill-item-text">
        <div class="skill-item-name">${escHtml(skill.name)}</div>
        <div class="skill-item-desc">${escHtml(skill.description || '')}</div>

function renderSidebar() {
  refs.list.innerHTML = ''
  for (const c of conversations) {
    const row = document.createElement('div')

async function newConversation() {
  const model = refs.model.value || null
  const data = await api('/api/conversations', {
    method: 'POST',
    body: JSON.stringify({ title: '新对话', model }),
  })

  await switchConversation(data.conversation.id)
}

async function switchConversation(id) {
  const data = await api(`/api/conversations/${id}`)
  currentConversation = data.conversation
  messages = data.messages || []
  refs.title.textContent = currentConversation.title || '新对话'
  LS.set('activeConversationId', id)
  if (currentConversation.model) refs.model.value = currentConversation.model
  renderSidebar()
  renderMessages(messages)
  if (window.innerWidth <= 720) closeSidebar()
}

function renderMessages(items) {
  refs.messages.innerHTML = ''
  if (!items.length) {
    refs.messages.innerHTML = '<div id="empty-state">开始对话</div>'
    return
  }
  for (const msg of items) appendMessage(msg, false)
  scrollToBottom()
}

function appendMessage(msg, scroll = true) {
  const row = document.createElement('div')
  row.className = `msg-row ${msg.role}`
  const label = document.createElement('div')
  label.className = 'msg-label'
  label.textContent = msg.role === 'user' ? '你' : '助手'
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  if (msg.role === 'user') {
    bubble.innerHTML = renderUserContent(msg.content)
  } else {
    bubble.innerHTML = marked.parse(String(msg.content || ''))
  }
  row.append(label, bubble)
  refs.messages.appendChild(row)
  if (scroll) scrollToBottom()
  return bubble
}

function renderUserContent(content) {
  if (!Array.isArray(content)) return `<p>${escHtml(content || '')}</p>`
  return content.map((part) => {
    if (part.type === 'text') return `<p>${escHtml(part.text || '')}</p>`
    if (part.type === 'image_url') return `<img src="${escAttr(part.image_url?.url || '')}" />`
    return ''
  }).join('')
}

function scrollToBottom() {
  refs.messages.scrollTo({ top: refs.messages.scrollHeight, behavior: 'smooth' })
}

async function sendMessage() {
  if (isStreaming) return
  const text = refs.input.value.trim()
  if (!text && !pendingImages.length) return
  const providerId = getSelectedProvider()?.id || ''
  if (!providerId) return setStatus('请联系管理员配置全局 Provider')
  if (!refs.model.value) return setStatus('请先选择模型')
  if (!currentConversation) await newConversation()

  let content = text
  if (pendingImages.length) {
    content = []
    if (text) content.push({ type: 'text', text })
    for (const img of pendingImages) content.push({ type: 'image_url', image_url: { url: img.serverUrl } })
  }

  const userMsg = { role: 'user', content }
  appendMessage(userMsg)
  refs.input.value = ''
  refs.input.style.height = ''
  pendingImages = []
  renderImagePreviews()

  const assistantMsg = { role: 'assistant', content: '' }
  const bubble = appendMessage(assistantMsg)
  bubble.innerHTML = '<span style="color:var(--text2);font-style:italic">思考中</span><span class="cursor"></span>'

  isStreaming = true
  refs.send.disabled = true
  setStatus('')
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
      body: JSON.stringify({
        conversationId: currentConversation.id,
        providerId,
        model: refs.model.value,
        message: { role: 'user', content },
        skillId: activeSkillId,
        stream: true,
      }),
    })
    if (!res.ok) {
      let message = `HTTP ${res.status}`
      try { message = (await res.json()).error || message } catch {}
      throw new Error(message)
    }
    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''
    let raw = ''
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const payload = line.slice(6).trim()
        if (!payload || payload === '[DONE]') continue
        try {
          const chunk = JSON.parse(payload)
          raw += chunk.choices?.[0]?.delta?.content || ''
          bubble.innerHTML = marked.parse(raw) + '<span class="cursor"></span>'
          scrollToBottom()
        } catch {}
      }
    }
    bubble.innerHTML = marked.parse(raw)
    LS.set('lastModel', refs.model.value)
    await loadConversations()
    await switchConversation(currentConversation.id)
  } catch (err) {
    bubble.innerHTML = `<span class="danger">${escHtml(err.message)}</span>`
  } finally {
    isStreaming = false
    refs.send.disabled = false
  }
}

async function uploadImage(file) {
  const fd = new FormData()
  fd.append('file', file)
  const json = await api('/api/upload', { method: 'POST', body: fd })
  return json.url
}

async function addImageFile(file) {
  const dataUrl = await readAsDataURL(file)
  const serverUrl = await uploadImage(file)
  pendingImages.push({ dataUrl, serverUrl })
  renderImagePreviews()
}

function renderImagePreviews() {
  refs.previews.innerHTML = ''
  pendingImages.forEach((img, index) => {
    const wrap = document.createElement('div')
    wrap.className = 'img-preview-wrap'
    wrap.innerHTML = `<img src="${escAttr(img.dataUrl)}" /><button class="remove-img">×</button>`
    wrap.querySelector('button').onclick = () => { pendingImages.splice(index, 1); renderImagePreviews() }
    refs.previews.appendChild(wrap)
  })
}

function readAsDataURL(file) {
  return new Promise((resolve) => {
    const reader = new FileReader()
    reader.onload = (event) => resolve(event.target.result)
    reader.readAsDataURL(file)
  })
}

async function loadAdminProviderModels() {
  const providerId = $('admin-provider-id').value.trim()
  const baseUrl = $('admin-provider-base-url').value.trim()
  const statusEl = $('admin-model-load-status')
  const selectEl = $('admin-provider-default-model-select')
  const inputEl = $('admin-provider-default-model')
  const btn = $('admin-load-models-btn')

  if (!baseUrl) {
    statusEl.textContent = '请先填写 Base URL'
    statusEl.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = '加载中...'
  statusEl.textContent = ''
  statusEl.style.display = 'none'

  try {
    let models = []
    if (providerId) {
      // 已存在的 provider，用后端接口
      const data = await api(`/api/admin/providers/${providerId}/models`)
      models = data.models || []
    } else {
      // 新 provider，直接调 OpenAI compatible endpoint
      const apiKey = $('admin-provider-api-key').value.trim()
      const url = baseUrl.replace(/\/$/, '') + '/v1/models'
      const headers = { 'Content-Type': 'application/json' }
      if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`
      let resp = await fetch(url, { headers })
      if (!resp.ok) {
        // fallback: try without /v1 prefix
        const fallbackUrl = baseUrl.replace(/\/$/, '') + '/models'
        resp = await fetch(fallbackUrl, { headers })
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`)
      }
      const json = await resp.json()
      models = (json.data || json.models || []).map((m) => (typeof m === 'string' ? m : m.id || m.name || '')).filter(Boolean)
    }

    const currentVal = inputEl.value.trim()
    selectEl.innerHTML = '<option value="">-- 请选择模型 --</option>'
      + models.map((m) => `<option value="${escAttr(m)}"${m === currentVal ? ' selected' : ''}>${escHtml(m)}</option>`).join('')

    if (models.length === 0) {
      statusEl.textContent = '未获取到模型列表'
      statusEl.style.display = 'block'
    } else {
      statusEl.textContent = `✓ 已加载 ${models.length} 个模型`
      statusEl.style.color = 'var(--text2)'
      statusEl.style.display = 'block'
    }
  } catch (err) {
    statusEl.textContent = `⚠ 加载失败：${err.message}（可手动输入）`
    statusEl.style.display = 'block'
  } finally {
    btn.disabled = false
    btn.textContent = '⟳ 刷新'
  }
}

function formatBytes(bytes) {
  const size = Number(bytes) || 0
  if (size < 1024) return `${size} B`
  if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`
  return `${(size / 1024 / 1024).toFixed(1)} MB`
}

function renderAttachmentPreview(files = []) {
  const preview = $('clawhub-attachment-preview')
  if (!files.length) {
    preview.classList.add('hidden')
    preview.textContent = ''
    return
  }
  const shown = files.slice(0, 3).join(', ')
  const extra = files.length > 3 ? `, +${files.length - 3} 个` : ''
  preview.textContent = `📎 附带 ${files.length} 个附件文件：${shown}${extra}`
  preview.classList.remove('hidden')
}

async function toggleAdminSkillFiles(skill, row) {
  const existing = row.querySelector('.skill-files-list')
  if (existing) {
    existing.remove()
    return
  }

  const list = document.createElement('div')
  list.className = 'skill-files-list'
  list.innerHTML = '<div class="admin-skill-meta">正在加载附件…</div>'
  list.onclick = (e) => e.stopPropagation()
  row.appendChild(list)
  try {
    if (!adminSkillFiles[skill.id]) {
      const data = await api(`/api/admin/skills/${skill.id}/files`)
      adminSkillFiles[skill.id] = data.files || []
    }
    const files = adminSkillFiles[skill.id]
    list.innerHTML = files.length
      ? files.map((file) => `
          <div class="skill-file-item">
            <span class="skill-file-path" title="${escAttr(file.relative_path)}">${escHtml(file.relative_path)}</span>
            <span>${escHtml(formatBytes(file.file_size))}</span>
          </div>
        `).join('')
      : '<div class="admin-skill-meta">暂无附件文件</div>'
  } catch (err) {
    list.innerHTML = `<div class="admin-skill-meta danger">附件加载失败：${escHtml(err.message)}</div>`
  }
}

function renderAdminSkillList() {
  refs.adminSkillList.innerHTML = adminSkills.length ? '' : '<div id="empty-state">暂无 Skill</div>'
  for (const skill of adminSkills) {
    const row = document.createElement('div')
    row.className = `admin-skill-row${skill.files_count > 0 ? ' has-files' : ''}`
    const filesBadge = skill.files_count > 0 ? `<button class="skill-files-badge" type="button" title="查看附件文件">📎 ${escHtml(skill.files_count)}</button>` : ''
    row.innerHTML = `
      <div>
        <div class="admin-skill-name">${escHtml(skill.icon || '🤖')} ${escHtml(skill.name)}</div>
        <div class="admin-skill-meta">${skill.is_active ? '已启用' : '已停用'} · 排序 ${escHtml(skill.sort_order ?? 0)}${skill.description ? ' · ' + escHtml(skill.description) : ''}</div>
      </div>
      <div class="admin-skill-actions">
        ${filesBadge}
        <button class="secondary" type="button">编辑</button>
        <button class="secondary danger" type="button">删除</button>
      </div>`
    const filesBtn = row.querySelector('.skill-files-badge')
    const editBtn = row.querySelector('.admin-skill-actions .secondary:not(.danger)')
    const deleteBtn = row.querySelector('.admin-skill-actions .danger')
    if (filesBtn) {
      filesBtn.onclick = async (e) => {
        e.stopPropagation()
        await toggleAdminSkillFiles(skill, row)
      }
      row.onclick = async () => toggleAdminSkillFiles(skill, row)
    }
    editBtn.onclick = (e) => {
      e.stopPropagation()
      $('admin-skill-id').value = skill.id
      $('admin-skill-clawhub-slug').value = ''
      renderAttachmentPreview([])
      $('admin-skill-icon').value = skill.icon || '🤖'
      $('admin-skill-name').value = skill.name || ''
      $('admin-skill-desc').value = skill.description || ''
      $('admin-skill-prompt').value = skill.system_prompt || ''
      $('admin-skill-order').value = skill.sort_order ?? 0
      $('admin-skill-active').checked = Boolean(skill.is_active)
    }
    deleteBtn.onclick = async (e) => {
      e.stopPropagation()
      if (!confirm(`删除 Skill「${skill.name}」？`)) return
      try {
        await api(`/api/admin/skills/${skill.id}`, { method: 'DELETE' })
        await loadAdminSkills()
        await loadSkills()
      } catch (err) {
        alert(err.message)
      }
    }
    refs.adminSkillList.appendChild(row)
  }
}

// ClawHub 搜索
async function clawHubSearch(q) {
  const btn = $('clawhub-search-btn')
  const resultsEl = $('clawhub-results')
  btn.disabled = true
  btn.textContent = '搜索中...'
  resultsEl.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:13px;">正在搜索…</div>'
  resultsEl.classList.remove('hidden')
  try {
    const data = await api(`/api/admin/skills/clawhub/search?q=${encodeURIComponent(q)}`)
    if (!data.results?.length) {
      resultsEl.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:13px;">无结果</div>'
      return
    }
    resultsEl.innerHTML = ''
    for (const item of data.results) {
      const div = document.createElement('div')
      div.className = 'clawhub-result-item'
      div.innerHTML = `
        <span class="clawhub-result-slug">${escHtml(item.slug)}</span>
        <span class="clawhub-result-desc">${escHtml(item.description || '')}</span>
        <button class="clawhub-import-btn" data-slug="${escAttr(item.slug)}">导入</button>
      `
      div.querySelector('.clawhub-import-btn').onclick = async (e) => {
        e.stopPropagation()
        const slug = e.target.dataset.slug
        await clawHubImport(slug)
      }
      resultsEl.appendChild(div)
    }
  } catch (err) {
    resultsEl.innerHTML = `<div style="padding:10px;color:var(--danger);font-size:13px;">搜索失败：${escHtml(err.message)}</div>`
  } finally {
    btn.disabled = false
    btn.textContent = '搜索'
  }
}

async function clawHubImport(slug) {
  const resultsEl = $('clawhub-results')
  const btn = Array.from(resultsEl.querySelectorAll('.clawhub-import-btn')).find((item) => item.dataset.slug === slug)
  if (btn) { btn.disabled = true; btn.textContent = '加载中…' }
  try {
    const data = await api(`/api/admin/skills/clawhub/preview?slug=${encodeURIComponent(slug)}`)
    $('admin-skill-id').value = ''
    $('admin-skill-clawhub-slug').value = slug
    $('admin-skill-icon').value = '⚡'
    $('admin-skill-name').value = data.name || slug
    $('admin-skill-desc').value = data.description || ''
    $('admin-skill-prompt').value = data.system_prompt || ''
    $('admin-skill-order').value = '0'
    $('admin-skill-active').checked = true
    renderAttachmentPreview(data.attachmentFiles || [])
    resultsEl.classList.add('hidden')
    $('admin-skill-form').scrollIntoView({ behavior: 'smooth' })
  } catch (err) {
    alert(`导入失败：${err.message}`)
    if (btn) { btn.disabled = false; btn.textContent = '导入' }
  }
}

function setAdminTab(tab) {
  const showSkills = tab === 'skills'
  refs.adminPaneProviders.classList.toggle('hidden', showSkills)
  refs.adminPaneSkills.classList.toggle('hidden', !showSkills)
  refs.adminTabProviders.classList.toggle('active', !showSkills)
  refs.adminTabSkills.classList.toggle('active', showSkills)
}

function toggleSidebar() {
  const open = refs.sidebar.classList.toggle('open')
  const ov = document.getElementById('sidebar-overlay')
  if (ov) ov.classList.toggle('show', open)
}

function closeSidebar() {
  refs.sidebar.classList.remove('open')
  const ov = document.getElementById('sidebar-overlay')
  if (ov) ov.classList.remove('show')
}

async function openAdminModal() {
  if (!currentUser?.isAdmin) return
  clearAdminProviderForm()
  clearAdminSkillForm()
  setAdminTab('providers')
  refs.adminModal.classList.add('open')
  await Promise.all([loadAdminProviders(), loadAdminSkills()])
}

refs.adminProviderForm.onsubmit = async (event) => {
  event.preventDefault()
  const id = $('admin-provider-id').value
  const body = {
    name: $('admin-provider-name').value.trim(),
    baseUrl: $('admin-provider-base-url').value.trim(),
    defaultModel: $('admin-provider-default-model').value.trim(),
  }
  const apiKey = $('admin-provider-api-key').value.trim()
  if (apiKey || !id) body.apiKey = apiKey
  await api(id ? `/api/admin/providers/${id}` : '/api/admin/providers', {
    method: id ? 'PATCH' : 'POST',
    body: JSON.stringify(body),
  })
  clearAdminProviderForm()
  await loadAdminProviders()
  await loadProviders()
}

refs.adminSkillForm.onsubmit = async (event) => {
  event.preventDefault()
  const id = $('admin-skill-id').value
  const body = {
    icon: $('admin-skill-icon').value.trim() || '🤖',
    name: $('admin-skill-name').value.trim(),
    description: $('admin-skill-desc').value.trim(),
    system_prompt: $('admin-skill-prompt').value.trim(),
    sort_order: Number.parseInt($('admin-skill-order').value, 10) || 0,
    is_active: $('admin-skill-active').checked,
  }
  const clawhubSlug = $('admin-skill-clawhub-slug').value.trim()
  if (!id && clawhubSlug) body.clawhub_slug = clawhubSlug
  try {
    await api(id ? `/api/admin/skills/${id}` : '/api/admin/skills', {
      method: id ? 'PATCH' : 'POST',
      body: JSON.stringify(body),
    })
    clearAdminSkillForm()
    await loadAdminSkills()
    await loadSkills()
  } catch (err) {
    alert(err.message)
  }
}

function copyCode(btn) {
  navigator.clipboard.writeText(btn.nextElementSibling.innerText).then(() => {
    btn.textContent = '已复制'
    setTimeout(() => { btn.textContent = '复制' }, 1200)
  })
}

function escHtml(value) {
  return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}
function escAttr(value) {
  return escHtml(value).replace(/'/g, '&#39;')
}

$('logout-btn').onclick = async () => {
  try { await api('/api/auth/logout', { method: 'POST' }) } catch {}
  LS.del('authToken')
  LS.del('activeConversationId')
  location.reload()
}
$('new-chat-btn').onclick = newConversation
refs.model.onchange = () => LS.set('lastModel', refs.model.value)
$('admin-btn').onclick = openAdminModal
$('admin-modal-close').onclick = () => refs.adminModal.classList.remove('open')
$('admin-provider-reset').onclick = clearAdminProviderForm
$('admin-load-models-btn').onclick = loadAdminProviderModels
$('admin-provider-default-model-select').onchange = function() {
  if (this.value) $('admin-provider-default-model').value = this.value
}
$('admin-provider-default-model').oninput = function() {
  // 如果手动输入，尝试同步 select
  const select = $('admin-provider-default-model-select')
  const opt = [...select.options].find(o => o.value === this.value)
  if (opt) select.value = this.value
  else select.value = ''
}
refs.adminTabProviders.onclick = () => setAdminTab('providers')
refs.adminTabSkills.onclick = () => setAdminTab('skills')
$('admin-skill-reset').onclick = clearAdminSkillForm
$('clawhub-search-btn').onclick = () => {
  const q = $('clawhub-search-input').value.trim()
  if (q) clawHubSearch(q)
}
$('clawhub-search-input').onkeydown = (e) => {
  if (e.key === 'Enter') {
    const q = $('clawhub-search-input').value.trim()
    if (q) clawHubSearch(q)
  }
}
refs.skillBtn.onclick = (event) => {
  event.stopPropagation()
  refs.skillPicker.classList.toggle('hidden')
}
refs.skillPicker.onclick = (event) => event.stopPropagation()
$('toggle-sidebar').onclick = () => toggleSidebar()
if ($('close-sidebar')) $('close-sidebar').onclick = () => closeSidebar()
document.getElementById('sidebar-overlay').onclick = closeSidebar
$('send-btn').onclick = sendMessage
refs.input.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage() }
})
refs.input.addEventListener('input', () => {
  refs.input.style.height = 'auto'
  refs.input.style.height = Math.min(refs.input.scrollHeight, 200) + 'px'
})
$('upload-btn').onclick = () => $('file-input').click()
$('file-input').onchange = async (event) => {
  for (const file of event.target.files) await addImageFile(file)
  event.target.value = ''
}
document.addEventListener('paste', async (event) => {
  for (const item of Array.from(event.clipboardData?.items || [])) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile()
      if (file) { event.preventDefault(); await addImageFile(file) }
    }
  }
})
document.addEventListener('click', () => refs.skillPicker.classList.add('hidden'))
$('sys-prompt-btn').onclick = () => {
  refs.sysInput.value = currentConversation?.systemPrompt || ''
  refs.sysModal.classList.add('open')
}
$('sys-cancel').onclick = () => refs.sysModal.classList.remove('open')
$('sys-save').onclick = async () => {
  if (!currentConversation) await newConversation()
  const systemPrompt = refs.sysInput.value.trim()
  const data = await api(`/api/conversations/${currentConversation.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ systemPrompt }),
  })
  currentConversation = data.conversation
  refs.sysModal.classList.remove('open')
}
$('clear-btn').onclick = async () => {
  if (!currentConversation || !confirm('删除当前对话？')) return
  await api(`/api/conversations/${currentConversation.id}`, { method: 'DELETE' })
  currentConversation = null
  messages = []
  refs.title.textContent = '新对话'
  renderMessages([])
  await loadConversations()
}
refs.sysModal.addEventListener('click', (event) => { if (event.target === refs.sysModal) refs.sysModal.classList.remove('open') })

;(async function init() {
  if (!authToken) return
  try {
    const data = await api('/api/auth/me')
    currentUser = data.user
    await enterApp()
  } catch {
    LS.del('authToken')
    authToken = ''
  }
})()
</script>
</body>
</html>
