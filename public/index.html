<script>window.Prism = window.Prism || {}; window.Prism.manual = true;</script>
<style>
  :root {
    --bg: #eef3fb; --surface: #ffffff; --surface2: #f4f7fd; --surface3: #e5ecf8; --border: #d2dcec;
    --accent: #2f6fec; --accent2: #2356be; --text: #1a2233; --text2: #67758f;

    --motion-base: .18s;
    --motion-ease: cubic-bezier(.2,.8,.2,1);

    --chat-stream-max: 980px;
    --chat-compose-max: 900px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Source Han Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(1200px 700px at 100% -120px, rgba(47,111,236,.09), transparent 60%), linear-gradient(180deg, #f6f9ff 0%, var(--bg) 36%, #edf2fb 100%); color: var(--text); }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: .55; }
  .hidden { display: none !important; }

  #boot-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .boot-box { display: grid; place-items: center; gap: 14px; color: var(--text2); }
  .boot-mark { width: 54px; height: 54px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; box-shadow: 0 14px 38px rgba(15,23,42,.08); position: relative; }
  .boot-spinner { width: 26px; height: 26px; border-radius: 50%; border: 3px solid var(--surface3); border-top-color: var(--accent); animation: spin .8s linear infinite; }
  .boot-text { font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #auth-screen {

    place-items: center;
    padding: 24px;

  .auth-box {
    width: min(430px, 100%);

    border: 1px solid rgba(255,255,255,.62);
    border-radius: 20px;
    padding: 24px;

    gap: 16px;
    box-shadow: 0 36px 90px -42px rgba(9,15,32,.76), 0 1px 0 rgba(255,255,255,.88) inset;
    position: relative;

    animation: auth-pop .24s var(--motion-ease);

  .auth-box::before {
    content: '';

    width: 210px;
    height: 210px;
    right: -76px;

    background: radial-gradient(circle, rgba(47,111,236,.22) 0%, rgba(47,111,236,0) 70%);

  }
  .auth-box::after {
    content: '';

    width: 170px;

    border-radius: 50%;

    pointer-events: none;
  }
  @keyframes auth-pop {

  }
  .auth-close {

  #auth-status { min-height: 18px; color: var(--danger); font-size: 13px; line-height: 1.4; padding-left: 2px; }
  .primary, .btn { background: var(--accent); color: white; border: 0; border-radius: 8px; padding: 10px 14px; }
  .secondary { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
  .secondary.active { background: var(--surface2); color: var(--accent2); border-color: var(--accent); }
  .danger { color: var(--danger); }

  .sidebar-brand { display: flex; align-items: center; gap: 8px; min-width: 0; }

  .conversation { position: relative; display: grid; grid-template-columns: minmax(0, 1fr) auto auto; align-items: center; gap: 10px; padding: 12px 10px; border-radius: 12px; color: var(--text2); cursor: pointer; transform: translateY(0); transition: background-color var(--motion-fast) var(--motion-ease), color var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), transform var(--motion-fast) var(--motion-ease); }
  .conversation:not(.active):hover { background: #eef4ff; color: #2b3a57; box-shadow: 0 6px 14px -12px rgba(35,86,190,.35); transform: translateY(-1px); }
  .conversation.active { background: linear-gradient(180deg, #e8f1ff 0%, #e3eeff 100%); color: #1d2f56; box-shadow: inset 0 0 0 1px rgba(47,111,236,.34); }
  .conversation.active:hover { transform: none; box-shadow: inset 0 0 0 1px rgba(47,111,236,.34); }

  .conversation-title { min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 14.5px; line-height: 1.3; color: inherit; }
  .conversation-time { font-size: 12px; color: #8392ac; white-space: nowrap; }
  .conversation-menu { opacity: 0; width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
  .conversation:hover .conversation-menu, .conversation.active .conversation-menu { opacity: 1; }
  .conversation.loading .conversation-title::after { content: "加载中"; margin-left: 6px; font-size: 11px; color: var(--text2); }
  #sidebar.collapsed .sidebar-title,
  #sidebar.collapsed #new-chat-btn span:not(.btn-icon),
  #sidebar.collapsed #user-line,
  #sidebar.collapsed #admin-btn span:not(.btn-icon),
  #sidebar.collapsed #logout-btn span:not(.btn-icon),
  #sidebar.collapsed #status,
  #sidebar.collapsed #conversation-list { display: none; }
  #sidebar.collapsed .sidebar-header {
    padding: 16px 10px 10px;
    border-bottom: 0;

  }
  #sidebar.collapsed .sidebar-brand {

  }

  #sidebar.collapsed #new-chat-btn,

  }
  #sidebar.collapsed .sidebar-header-actions,
  #sidebar.collapsed #settings-panel { justify-items: center; }
  #sidebar.collapsed .sidebar-header-actions { gap: 6px; }
  #sidebar.collapsed #settings-panel {
    border-top: 0;
    margin-top: auto;
    padding: 8px 0 16px;
    gap: 8px;
  }
  #sidebar.collapsed .btn-icon {

  }

  .icon-btn { background: transparent; color: var(--text2); border: 0; border-radius: 6px; padding: 5px 7px; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

<script>
const LS = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v) } catch { return fallback } },
  set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
  del: (key) => localStorage.removeItem(key),
}

function configureMarkdownRenderer() {
  if (!window.marked || window.__markdownRendererReady) return
  marked.setOptions({ breaks: true, gfm: true })
  const renderer = new marked.Renderer()
  renderer.code = (tokenOrCode, infostring) => {
    const isToken = tokenOrCode && typeof tokenOrCode === 'object'
    const text = isToken ? tokenOrCode.text : tokenOrCode
    const lang = cleanCodeLanguage(isToken ? tokenOrCode.lang : infostring)
    const prismLang = normalizePrismLanguage(lang)
    const langClass = prismLang ? `language-${escAttr(prismLang)}` : 'language-none'
    const dataLang = escAttr(prismLang || 'text')
    return `<pre class="${langClass}" data-lang="${dataLang}"><button class="copy-btn" onclick="copyCode(this)">复制</button><code class="${langClass}">${escHtml(text || '')}</code></pre>`
  }
  marked.use({ renderer })
  window.__markdownRendererReady = true
}

function renderMarkdown(value) {
  configureMarkdownRenderer()
  const text = String(value || '')
  const withLatex = renderLatexInMarkdown(text)
  if (!window.marked) return withLatex.html
  try {
    return marked.parse(withLatex.html)
  } catch {
    return withLatex.fallback
  }
}

function renderLatexInMarkdown(text) {
  const source = String(text || '')
  const fallback = escHtml(source).replace(/\n/g, '<br>')
  if (!window.katex?.renderToString) return { html: source, fallback }

  const protectedParts = []
  const protect = (match) => {
    const index = protectedParts.length
    protectedParts.push(match)
    return `\uE000${index}\uE001`
  }
  let html = source
    .replace(/```[\s\S]*?```/g, protect)
    .replace(/~~~[\s\S]*?~~~/g, protect)
    .replace(/`[^`\n]*(?:`|$)/g, protect)

  html = renderBlockLatex(html, /\$\$([\s\S]+?)\$\$/g, '$$', '$$')
  html = renderBlockLatex(html, /\\\[([\s\S]+?)\\\]/g, '\\[', '\\]')
  html = renderInlineLatex(html, /\\\(([\s\S]+?)\\\)/g, '\\(', '\\)')
  html = renderDollarInlineLatex(html)
  html = renderBareLatex(html)

  html = html.replace(/\uE000(\d+)\uE001/g, (_, index) => protectedParts[Number(index)] || '')
  return { html, fallback }
}

function renderBlockLatex(value, pattern, open, close) {
  return value.replace(pattern, (match, formula) => {
    const rendered = renderLatexFormula(formula, { displayMode: true })
    return rendered || escHtml(`${open}${formula}${close}`)
  })
}

function renderInlineLatex(value, pattern, open, close) {
  return value.replace(pattern, (match, formula) => {
    const rendered = renderLatexFormula(formula, { displayMode: false })
    return rendered || escHtml(`${open}${formula}${close}`)
  })
}

function renderDollarInlineLatex(value) {
  return value.replace(/(^|[^\w\\])\$([^\n$]+?)\$(?![\w])/g, (match, prefix, formula) => {
    const trimmed = String(formula || '').trim()
    if (!looksLikeLatex(trimmed)) return match
    const rendered = renderLatexFormula(trimmed, { displayMode: false })
    return rendered ? `${prefix}${rendered}` : match
  })
}

function renderBareLatex(value) {
  const pattern = /\\(?:max|min|sum|prod|frac|sqrt|left|right|text|cdot|times|leq?|geq?|neq|infty|alpha|beta|gamma|lambda|theta|pi|dots|ldots)\b[^\n。；;!?]*/g
  return value.replace(pattern, (match) => {
    const candidate = String(match || '').trim()
    if (!candidate) return match
    if (/[\u4e00-\u9fff]/.test(candidate)) return match
    const rendered = renderLatexFormula(candidate, { displayMode: false })
    return rendered || match
  })
}

function looksLikeLatex(value) {
  const text = String(value || '').trim()
  if (!text) return false
  if (/^\d+(?:\.\d+)?$/.test(text)) return false
  return /[\\^_{}=+\-*/<>]|[A-Za-zα-ωΑ-Ω]/.test(text)
}

function renderLatexFormula(formula, options = {}) {
  const tex = sanitizeLatexFormula(formula)
  if (!tex) return ''
  try {
    const rendered = katex.renderToString(tex, {
      displayMode: Boolean(options.displayMode),
      throwOnError: false,
      strict: 'ignore',
      trust: false,
      output: 'html',
    })
    if (rendered.includes('katex-error')) return ''
    return options.displayMode
      ? `<div class="math-block">${rendered}</div>`
      : `<span class="math-inline">${rendered}</span>`
  } catch {
    return ''
  }
}

function sanitizeLatexFormula(formula) {
  const raw = String(formula || '').trim()
  if (!raw) return ''
  return raw.replace(/\\text\{([^}]*)\}/g, (_, content) => `\\text{${escapeLatexTextContent(content)}}`)
}

function escapeLatexTextContent(value) {
  const text = String(value || '')
  let out = ''
  for (let i = 0; i < text.length; i += 1) {
    const ch = text[i]
    if (ch === '_' && text[i - 1] !== '\\') out += '\\_'
    else out += ch
  }
  return out
}

function loadScript(src) {
  if ([...document.scripts].some((script) => script.src === src)) return Promise.resolve()
  return new Promise((resolve, reject) => {
    const script = document.createElement('script')
    script.src = src
    script.async = true
    script.onload = resolve
    script.onerror = reject
    document.head.appendChild(script)
  })
}

let markdownLibrariesPromise = null
function loadMarkdownLibraries() {
  if (markdownLibrariesPromise) return markdownLibrariesPromise
  markdownLibrariesPromise = Promise.allSettled([
    window.marked ? Promise.resolve() : loadScript('/vendor/marked/marked.min.js'),
    window.Prism?.highlightElement ? Promise.resolve() : loadScript('/vendor/prism/prism.js'),
    window.katex?.renderToString ? Promise.resolve() : loadScript('/vendor/katex/katex.min.js'),
  ]).then(() => (
    window.Prism?.plugins?.autoloader ? null : loadScript('/vendor/prism/plugins/autoloader/prism-autoloader.min.js').catch(() => {})
  )).then(() => {
    configureMarkdownRenderer()
    if (messages.length) renderMessages(messages, { scrollMode: 'preserve' })
  })
  return markdownLibrariesPromise
}

function cleanCodeLanguage(value) {
  return String(value || '').trim().split(/\s+/)[0].replace(/[^\w#+.-]/g, '')
}

function normalizePrismLanguage(lang) {
  const aliases = {
    js: 'javascript',
    jsx: 'jsx',
    ts: 'typescript',
    tsx: 'tsx',
    py: 'python',
    sh: 'bash',
    shell: 'bash',
    zsh: 'bash',
    yml: 'yaml',
    md: 'markdown',
    html: 'markup',
    xml: 'markup',
    svg: 'markup',
    vue: 'markup',
  }
  const normalized = String(lang || '').toLowerCase()
  return aliases[normalized] || normalized
}

function applySyntaxHighlighting(root) {
  if (!root) return
  if (window.Prism?.plugins?.autoloader) {
    window.Prism.plugins.autoloader.languages_path = '/vendor/prism/components/'
  }
  for (const code of root.querySelectorAll('pre code')) {
    if (code.dataset.highlighted) continue
    const lang = getCodeLanguage(code)
    const text = code.textContent || ''
    if (window.Prism?.highlightElement) {
      try {
        window.Prism.highlightElement(code)
        code.dataset.highlighted = 'yes'
        continue
      } catch {}
    }
    applyFallbackHighlighting(code, lang, text)
  }
}

function getCodeLanguage(code) {
  return Array.from(code.classList)
    .find((name) => name.startsWith('language-'))
    ?.slice('language-'.length)
    .toLowerCase()
}

function applyFallbackHighlighting(code, lang = getCodeLanguage(code), text = code.textContent || '') {
  code.innerHTML = fallbackHighlightCode(text, lang)
  code.dataset.highlighted = 'yes'
}

function fallbackHighlightCode(text, lang = '') {
  const placeholders = []
  let html = escHtml(text)
  const keep = (className) => (match) => {
    const id = placeholders.length
    placeholders.push(`<span class="${className}">${match}</span>`)
    return `\u0000${id}\u0000`
  }

  html = html
    .replace(/(&quot;[^&]*(?:&quot;|$)|&#39;[^&]*(?:&#39;|$)|`[^`]*(?:`|$))/g, keep('syntax-string'))
    .replace(/(\/\/.*|#.*|\/\*[\s\S]*?\*\/)/g, keep('syntax-comment'))
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="syntax-number">$1</span>')

  const keywordSets = {
    js: 'async await break case catch class const continue default delete do else export extends finally for from function if import in instanceof let new of return static switch throw try typeof var void while with yield true false null undefined',
    javascript: 'async await break case catch class const continue default delete do else export extends finally for from function if import in instanceof let new of return static switch throw try typeof var void while with yield true false null undefined',
    ts: 'abstract any as async await boolean break case catch class const constructor continue default delete do else enum export extends false finally for from function if implements import in instanceof interface let module namespace new null number of private protected public readonly return static string super switch this throw true try type typeof undefined var void while with yield',
    typescript: 'abstract any as async await boolean break case catch class const constructor continue default delete do else enum export extends false finally for from function if implements import in instanceof interface let module namespace new null number of private protected public readonly return static string super switch this throw true try type typeof undefined var void while with yield',
    python: 'and as assert async await break class continue def del elif else except false finally for from global if import in is lambda none nonlocal not or pass raise return true try while with yield',
    py: 'and as assert async await break class continue def del elif else except false finally for from global if import in is lambda none nonlocal not or pass raise return true try while with yield',
    json: 'true false null',
    bash: 'case do done elif else esac export fi for function if in local then while',
    sh: 'case do done elif else esac export fi for function if in local then while',
    css: 'important inherit initial unset',
    html: '',
  }
  const keywords = keywordSets[lang] || keywordSets.javascript
  if (keywords) {
    const pattern = new RegExp(`\\b(${keywords.trim().split(/\s+/).join('|')})\\b`, 'g')
    html = html.replace(pattern, '<span class="syntax-keyword">$1</span>')
  }
  html = html.replace(/\b([A-Za-z_$][\w$]*)\s*(?=\()/g, '<span class="syntax-function">$1</span>')
  html = html.replace(/\u0000(\d+)\u0000/g, (_, id) => placeholders[Number(id)] || '')
  return html
}

async function api(path, options = {}) {
  const { skipAuth = false, ...requestOptions } = options || {}
  const headers = { ...(requestOptions.headers || {}) }
  const isForm = requestOptions.body instanceof FormData
  if (!isForm) headers['Content-Type'] = 'application/json'
  if (!skipAuth && authToken) headers.Authorization = `Bearer ${authToken}`
  const res = await fetch(path, { ...requestOptions, headers })
  if (!res.ok) {
    let message = `HTTP ${res.status}`
    try {
      const data = await res.json()
      message = data.error || data.message || message
    } catch {
      try { message = await res.text() || message } catch {}
    }
    throw new Error(message)
  }
  if (res.status === 204) return null
  return res.json()
}

function extractSupportedProblemUrl(text) {
  const source = String(text || '')
  const patterns = [
    /https?:\/\/(?:www\.)?luogu\.com\.cn\/problem\/[A-Za-z0-9_-]+/i,
    /https?:\/\/(?:www\.)?codeforces\.com\/problemset\/problem\/\d+\/[A-Za-z0-9]+/i,
    /https?:\/\/(?:www\.)?codeforces\.com\/contest\/\d+\/problem\/[A-Za-z0-9]+/i,
    /https?:\/\/(?:www\.)?judge\.yosupo\.jp\/problem\/[A-Za-z0-9._-]+/i,
  ]
  for (const pattern of patterns) {
    const match = source.match(pattern)
    if (match?.[0]) return match[0]
  }
  return ''
}

function normalizeProblemImportUrl(rawUrl) {
  const source = String(rawUrl || '').trim()
  if (!source) return ''
  const matched = extractSupportedProblemUrl(source)
  return matched || source
}

async function importProblemToComposer(rawUrl, triggerButton = null) {
  const url = normalizeProblemImportUrl(rawUrl)
  if (!url) {
    setStatus('题目链接不能为空')
    return
  }

  const importBtn = triggerButton || document.getElementById('empty-luogu-import-btn')
  const urlInput = document.getElementById('empty-luogu-url')
  if (urlInput) urlInput.value = url
  if (importBtn) importBtn.disabled = true
  setStatus('正在导入题面...', false)

  try {
    const importPath = authToken ? '/api/code-review/import-problem' : '/api/public/import-problem-preview'
    const payload = await api(importPath, {
      method: 'POST',
      body: JSON.stringify({ url }),
      skipAuth: !authToken,
    })
    const importedText = String(payload.problemText || '')
    if (!importedText.trim()) throw new Error('题面导入为空，请换一个链接重试')
    refs.input.value = importedText
    refs.input.style.height = 'auto'
    refs.input.style.height = Math.min(refs.input.scrollHeight, 200) + 'px'
    refs.input.focus()
    const importedLabel = payload.meta?.title || payload.meta?.pid || '洛谷题面'
    if (!authToken) {
      setStatus(`导入完成：${importedLabel}，点击发送将弹出登录并自动继续`, false)
      return
    }
    setStatus(`导入完成：${importedLabel}，正在自动发送...`, false)

    const content = buildMessageContentFromMarkdown(refs.input.value)
    if (!hasEditableContent(content)) {
      throw new Error('导入内容为空，无法自动发送')
    }

    try {
      await sendMessage()
    } catch (sendErr) {
      setStatus(`导入成功，但自动发送失败：${sendErr?.message || '请手动点击发送重试'}`)
      return
    }

    setStatus(`导入并发送完成：${importedLabel}`, false)
  } catch (err) {
    setStatus(err.message || '题目导入失败')
  } finally {
    if (importBtn) importBtn.disabled = false
  }
}

function bindChatEmptyStateEvents() {
  const urlInput = document.getElementById('empty-luogu-url')
  const importBtn = document.getElementById('empty-luogu-import-btn')
  if (!urlInput || !importBtn) return

  importBtn.onclick = () => importProblemToComposer(urlInput.value, importBtn)
  urlInput.addEventListener('keydown', (event) => {
    if (event.key !== 'Enter') return
    event.preventDefault()

  })
  urlInput.addEventListener('paste', (event) => {
    const pasted = event.clipboardData?.getData('text/plain') || ''
    const parsed = extractSupportedProblemUrl(pasted)
    if (!parsed) return
    event.preventDefault()
    urlInput.value = parsed
  })

  for (const tag of document.querySelectorAll('[data-luogu-pid]')) {
    tag.addEventListener('click', () => {
      const pid = String(tag.getAttribute('data-luogu-pid') || '').trim().toUpperCase()

      const url = `https://www.luogu.com.cn/problem/${pid}`
      urlInput.value = url
      importProblemToComposer(url, importBtn)
    })
  }
}

function formatRelativeTime(value) {
  if (!value) return ''
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) return ''
  const diffMs = Date.now() - date.getTime()
  const diffMinutes = Math.max(0, Math.floor(diffMs / 60000))
  if (diffMinutes < 1) return '刚刚'
  if (diffMinutes < 60) return `${diffMinutes}分钟前`
  const diffHours = Math.floor(diffMinutes / 60)
  if (diffHours < 24) return `${diffHours}小时前`
  const diffDays = Math.floor(diffHours / 24)
  if (diffDays < 30) return `${diffDays}天前`
  const month = `${date.getMonth() + 1}`.padStart(2, '0')
  const day = `${date.getDate()}`.padStart(2, '0')
  return `${month}-${day}`
}

async function fetchConversationData(id, { force = false } = {}) {
  if (!force && conversationDataCache.has(id)) return conversationDataCache.get(id)
  if (!force && conversationFetches.has(id)) return conversationFetches.get(id)

  const request = api(`/api/conversations/${id}?limit=100`)
    .then((data) => {
      conversationDataCache.set(id, data)
      conversationFetches.delete(id)
      return data
    })
    .catch((err) => {
      conversationFetches.delete(id)
      throw err
    })
  conversationFetches.set(id, request)
  return request
}

function clearConversationDataCache(id) {
  if (!id) return
  conversationDataCache.delete(id)
  conversationFetches.delete(id)
  conversationScrollPositions.delete(id)
}

function updateConversationDataCache(conversation = currentConversation, items = messages) {
  if (!conversation?.id) return
  conversationDataCache.set(conversation.id, {
    conversation,
    messages: [...items],
  })
}

async function refreshConversationDataById(conversationId, { render = false } = {}) {
  if (!conversationId) return null
  const data = await fetchConversationData(conversationId, { force: true })
  conversationDataCache.set(conversationId, data)
  if (render && currentConversation?.id === conversationId) {
    applyConversationData(data, conversationId)
  } else if (currentConversation?.id === conversationId) {
    currentConversation = data.conversation
    messages = data.messages || []
    updateConversationDataCache()
  }
  return data
}

function pruneConversationCache() {
  const ids = new Set(conversations.map((conversation) => conversation.id))
  for (const id of conversationDataCache.keys()) {
    if (!ids.has(id)) clearConversationDataCache(id)
  }
}

async function ensureConversationPersisted() {
  if (!isDraftConversation()) return currentConversation
  const draftSystemPrompt = String(currentConversation?.systemPrompt || '').trim()
  const data = await api('/api/conversations', {
    method: 'POST',
    body: JSON.stringify({

  })
  const persisted = {
    ...data.conversation,
    isDraft: false,
  }
  currentConversation = persisted
  refs.title.textContent = persisted.title || '新对话'
  if (persisted.id) LS.set('activeConversationId', persisted.id)
  clearConversationDataCache(persisted.id)
  updateConversationDataCache(persisted, messages)
  if (persisted.id && !conversations.some((conversation) => conversation.id === persisted.id)) {
    conversations = [persisted, ...conversations]
  }
  renderSidebar()
  loadConversations().catch(() => {})
  return persisted
}

async function switchConversation(id) {
  if (currentConversation?.id === id) return
  saveCurrentConversationScroll()
  const seq = ++switchConversationSeq
  const target = conversations.find((conversation) => conversation.id === id)
  const cached = conversationDataCache.get(id)
  if (cached) {
    isConversationLoading = false
    loadingConversationId = null
    refs.title.textContent = cached.conversation?.title || target?.title || '新对话'
    applyConversationData(cached, id)
    setComposerDisabled(false, id)
    return
  }

  isConversationLoading = true
  setComposerDisabled(true)
  loadingConversationId = id
  refs.title.textContent = target?.title || '加载中...'
  renderSidebar()
  renderMessagesLoading()
  try {
    const data = await fetchConversationData(id)
    if (seq !== switchConversationSeq) return
    applyConversationData(data, id)
  } catch (err) {
    if (seq !== switchConversationSeq) return
    refs.messages.innerHTML = `<div id="empty-state" class="danger">${escHtml(err.message)}</div>`
  } finally {
    if (seq === switchConversationSeq) {
      isConversationLoading = false
      loadingConversationId = null
      setComposerDisabled(false)
      renderSidebar()
    }
  }
}

function applyConversationData(data, id = data?.conversation?.id) {
  if (currentConversation?.id === id) saveCurrentConversationScroll()
  currentConversation = data.conversation
  messages = data.messages || []
  refs.title.textContent = currentConversation?.title || '新对话'
  if (id) LS.set('activeConversationId', id)
  renderSidebar()
  renderMessages(messages, { scrollMode: 'restore', conversationId: id })
  if (window.innerWidth <= 720) closeSidebar()
}

function renderMessagesLoading() {
  refs.messages.innerHTML = '<div id="empty-state">加载中...</div>'
}

function renderMessages(items, { scrollMode = 'bottom', conversationId = currentConversation?.id } = {}) {
  const previousTop = refs.messages.scrollTop
  const fragment = document.createDocumentFragment()
  if (!items.length) {
    refs.messages.innerHTML = renderChatEmptyState()
    bindChatEmptyStateEvents()
    return
  }
  for (const msg of items) fragment.appendChild(createMessageElement(msg))
  refs.messages.replaceChildren(fragment)
  applySyntaxHighlighting(refs.messages)
  applyMessageScroll(scrollMode, conversationId, previousTop)
}

function ensureMessageViewportReady() {
  const empty = refs.messages.querySelector('#empty-state')
  if (empty) refs.messages.replaceChildren()
}

function appendMessage(msg, scroll = true) {
  ensureMessageViewportReady()
  const row = createMessageElement(msg)
  refs.messages.appendChild(row)
  applySyntaxHighlighting(row)
  if (scroll) scrollToBottom()
  return row.querySelector('.bubble')
}

function isPendingAssistantMessage(msg) {
  return msg?.role === 'assistant' && !serializeMessageContent(msg.content).trim() && Boolean(msg.conversationId) && streamingConversationIds.has(msg.conversationId)
}

function renderPendingAssistantBubble() {
  return '<span style="color:var(--text2);font-style:italic">思考中</span><span class="cursor"></span>'
}

function getUserAvatarText() {
  const base = String(currentUser?.displayName || currentUser?.email || 'U').trim()
  if (!base) return 'U'
  return base[0].toUpperCase()
}

function createMessageAvatar(role) {
  const avatar = document.createElement('div')
  avatar.className = `msg-avatar ${role === 'user' ? 'user' : 'assistant'}`
  avatar.textContent = role === 'user' ? getUserAvatarText() : 'LC'
  return avatar
}

function createMessageElement(msg) {
  const row = document.createElement('div')
  row.className = `msg-row ${msg.role}`
  if (editingMessageId && msg.id === editingMessageId) row.classList.add('editing')
  if (msg.id) row.dataset.messageId = msg.id

  const body = document.createElement('div')
  body.className = 'msg-body'
  const avatar = createMessageAvatar(msg.role)
  const main = document.createElement('div')
  main.className = 'msg-main'

  const head = document.createElement('div')
  head.className = 'msg-head'
  const label = document.createElement('div')
  label.className = 'msg-label'
  label.textContent = msg.role === 'user' ? '你' : '助手'
  head.appendChild(label)
  const metaText = formatMessageMeta(msg)
  if (metaText) {
    const meta = document.createElement('div')
    meta.className = 'msg-meta'
    meta.textContent = metaText
    head.appendChild(meta)
  }
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  if (editingMessageId && msg.role === 'user' && msg.id === editingMessageId) {
    bubble.appendChild(createEditBox(msg))
  } else {
    bubble.innerHTML = msg.role === 'user'
      ? renderUserContent(msg.content)
      : isPendingAssistantMessage(msg)
        ? renderPendingAssistantBubble()
        : renderMarkdown(msg.content)
  }
  main.append(head, bubble)
  const actions = document.createElement('div')
  actions.className = 'msg-actions'
  const copy = document.createElement('button')
  copy.type = 'button'
  copy.className = 'msg-action'
  copy.title = '复制整条气泡内容'
  copy.textContent = '⧉'
  copy.onclick = () => copyMessageContent(copy, msg)
  actions.appendChild(copy)
  if (msg.role === 'user' && msg.id) {
    const edit = document.createElement('button')
    edit.type = 'button'
    edit.className = 'msg-action'
    edit.title = '编辑并重新发送'
    edit.textContent = '✎'
    edit.onclick = () => startEditMessage(msg.id)
    actions.appendChild(edit)
  }
  main.appendChild(actions)
  body.append(avatar, main)
  row.append(body)
  return row
}

function formatMessageMeta(msg) {
  return ''
}

function renderUserContent(content) {
  if (!Array.isArray(content)) return renderMarkdown(content || '')
  return content.map((part) => {
    if (part.type === 'text') return renderMarkdown(part.text || '')
    if (part.type === 'image_url') return `<img src="${escAttr(part.image_url?.url || '')}" alt="${escAttr(part.alt_text || '')}" />`
    return ''
  }).join('')
}

function createEditBox(msg) {
  const box = document.createElement('div')
  box.className = 'edit-box'
  const textarea = document.createElement('textarea')
  textarea.value = extractEditableText(msg.content)
  const actions = document.createElement('div')
  actions.className = 'edit-actions'
  const cancel = document.createElement('button')
  cancel.type = 'button'
  cancel.className = 'secondary'
  cancel.textContent = '取消'
  cancel.onclick = () => cancelEditMessage()
  const submit = document.createElement('button')
  submit.type = 'button'
  submit.className = 'primary'
  submit.textContent = '重新发送'
  submit.onclick = () => submitEditedMessage(msg, textarea.value)
  actions.append(cancel, submit)
  box.append(textarea, actions)
  setTimeout(() => {
    textarea.focus()
    textarea.selectionStart = textarea.value.length
    textarea.selectionEnd = textarea.value.length
  }, 0)
  return box
}

function extractEditableText(content) {
  if (Array.isArray(content)) return serializeMessageContent(content)
  return String(content || '')
}

function replaceUserTextInContent(content, text) {
  return buildMessageContentFromMarkdown(text)
}

function scrollToBottom() {
  refs.messages.scrollTo({ top: refs.messages.scrollHeight, behavior: 'smooth' })
}

function saveCurrentConversationScroll() {
  if (!currentConversation?.id) return
  conversationScrollPositions.set(currentConversation.id, refs.messages.scrollTop)
}

function applyMessageScroll(mode, conversationId, previousTop = refs.messages.scrollTop) {
  if (mode === 'none') return
  if (mode === 'preserve') {
    refs.messages.scrollTop = previousTop
    return
  }
  if (mode === 'restore' && conversationId && conversationScrollPositions.has(conversationId)) {
    refs.messages.scrollTo({ top: conversationScrollPositions.get(conversationId), behavior: 'auto' })
    return
  }
  refs.messages.scrollTo({ top: refs.messages.scrollHeight, behavior: 'auto' })
}

async function sendMessage() {
  if (isConversationLoading || streamingConversationIds.has(currentConversation?.id)) return
  const text = refs.input.value.trim()
  const content = buildMessageContentFromMarkdown(refs.input.value)
  if (!hasEditableContent(content)) return
  if (!authToken) {
    queuePendingSend()
    openAuthModal('登录后将自动继续发送')
    return
  }
  const providerId = getSelectedProvider()?.id || ''
  if (!providerId) return setStatus('请联系管理员配置全局 Provider')
  if (!currentConversation) await newConversation()
  if (isDraftConversation()) {
    try {
      await ensureConversationPersisted()
    } catch (err) {
      return setStatus(err.message || '新对话创建失败，请重试')
    }
  }

  const sourceConversation = currentConversation
  const sourceConversationId = sourceConversation?.id
  if (!sourceConversationId) return setStatus('当前对话不可用，请重试')

  const userMsg = { role: 'user', content }
  const assistantMsg = { role: 'assistant', content: '', conversationId: sourceConversationId }
  const streamMessages = [...messages, userMsg, assistantMsg]
  messages = streamMessages
  updateConversationDataCache(sourceConversation, streamMessages)
  appendMessage(userMsg)
  refs.input.value = ''
  refs.input.style.height = ''

  const bubble = appendMessage(assistantMsg)
  bubble.innerHTML = renderPendingAssistantBubble()

  streamingConversationIds.add(sourceConversationId)
  const controller = new AbortController()
  streamControllers.set(sourceConversationId, controller)
  setComposerDisabled(false, sourceConversationId)
  setStatus('')
  try {
    const { raw, stopped } = await streamAssistantResponse('/api/chat', {
      conversationId: sourceConversationId,
      providerId,
      message: { role: 'user', content },
      skillId: activeSkillId,
      stream: true,
    }, bubble, controller.signal, (partial) => {
      assistantMsg.content = partial
      updateConversationDataCache(sourceConversation, streamMessages)
    })
    assistantMsg.content = raw
    updateConversationDataCache(sourceConversation, streamMessages)
    if (currentConversation?.id === sourceConversationId) {
      bubble.innerHTML = raw ? renderMarkdown(raw) : '<span style="color:var(--text2);font-style:italic">已停止</span>'
      applySyntaxHighlighting(bubble)
    }
    if (raw) {
      if (currentConversation?.id === sourceConversationId) await refreshConversationDataById(sourceConversationId, { render: true })
      else await refreshConversationDataById(sourceConversationId, { render: false })
    } else if (stopped) {
      streamMessages.pop()
      messages = currentConversation?.id === sourceConversationId ? streamMessages : messages
      updateConversationDataCache(sourceConversation, streamMessages)
      if (currentConversation?.id === sourceConversationId) renderMessages(streamMessages, { scrollMode: 'bottom' })
    }
    loadConversations()
  } catch (err) {
    assistantMsg.content = err.message
    updateConversationDataCache(sourceConversation, streamMessages)
    if (currentConversation?.id === sourceConversationId) {
      bubble.innerHTML = `<span class="danger">${escHtml(err.message)}</span>`
    }
  } finally {
    streamingConversationIds.delete(sourceConversationId)
    streamControllers.delete(sourceConversationId)
    setComposerDisabled(isConversationLoading)
  }
}

async function streamAssistantResponse(url, payload, bubble, signal, onChunk) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
    body: JSON.stringify(payload),
    signal,
  })
  if (!res.ok) {
    let message = `HTTP ${res.status}`
    try { message = (await res.json()).error || message } catch {}
    throw new Error(message)
  }
  const reader = res.body.getReader()
  const decoder = new TextDecoder()
  let buffer = ''
  let raw = ''
  while (true) {
    let result
    try {
      result = await reader.read()
    } catch (err) {
      if (signal?.aborted) return { raw, stopped: true }
      throw err
    }
    const { done, value } = result
    if (done) break
    buffer += decoder.decode(value, { stream: true })
    const lines = buffer.split('\n')
    buffer = lines.pop()
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue
      const payloadText = line.slice(6).trim()
      if (!payloadText || payloadText === '[DONE]') continue
      try {
        const chunk = JSON.parse(payloadText)
        raw += chunk.choices?.[0]?.delta?.content || ''
        if (typeof onChunk === 'function') onChunk(raw)
        if (bubble?.isConnected) {
          bubble.innerHTML = renderMarkdown(raw) + '<span class="cursor"></span>'
          applySyntaxHighlighting(bubble)
          scrollToBottom()
        }
      } catch {}
    }
  }
  return { raw, stopped: false }
}

async function refreshCurrentConversationData({ render = false } = {}) {
  if (!currentConversation?.id) return null
  return refreshConversationDataById(currentConversation.id, { render })
}

function startEditMessage(id) {
  if (isConversationLoading || streamingConversationIds.has(currentConversation?.id)) return
  editingMessageId = id
  renderMessages(messages, { scrollMode: 'preserve' })
}

function cancelEditMessage() {
  editingMessageId = null
  renderMessages(messages, { scrollMode: 'preserve' })
}

function buildMessagesThroughEditedMessage(items, messageId, content) {
  const index = items.findIndex((item) => item.id === messageId && item.role === 'user')
  if (index < 0) return null
  const next = items.slice(0, index + 1)
  next[index] = { ...next[index], content }
  return next
}

async function submitEditedMessage(msg, text) {
  if (isConversationLoading || streamingConversationIds.has(currentConversation?.id) || !currentConversation?.id || !msg?.id) return
  const providerId = getSelectedProvider()?.id || ''
  setStatus('')
  const nextText = text.trim()
  if (!nextText && !Array.isArray(msg.content)) return setStatus('消息内容不能为空')
  let freshData
  try {
    freshData = await refreshCurrentConversationData()
  } catch (err) {
    return setStatus(err.message)
  }
  const freshMessages = freshData?.messages || messages
  const freshMsg = freshMessages.find((item) => item.id === msg.id && item.role === 'user')
  if (!freshMsg) {
    editingMessageId = null
    renderMessages(freshMessages, { scrollMode: 'bottom' })
    return setStatus('这条消息已经变化，请重新选择要编辑的消息')
  }
  const content = replaceUserTextInContent(freshMsg.content, nextText)
  if (!hasEditableContent(content)) return setStatus('消息内容不能为空')
  const nextMessages = buildMessagesThroughEditedMessage(freshMessages, msg.id, content)
  if (!nextMessages) return setStatus('这条消息已经变化，请重新选择要编辑的消息')

  const sourceConversation = currentConversation
  const sourceConversationId = currentConversation.id
  editingMessageId = null
  messages = nextMessages
  const pendingAssistant = { role: 'assistant', content: '', conversationId: sourceConversationId }
  messages.push(pendingAssistant)
  const streamMessages = [...messages]
  updateConversationDataCache(sourceConversation, streamMessages)
  renderMessages(messages, { scrollMode: 'bottom' })
  const bubble = refs.messages.querySelector('.msg-row.assistant:last-child .bubble')
  if (!bubble) return setStatus('重新生成失败：未找到回复气泡')
  bubble.innerHTML = renderPendingAssistantBubble()

  streamingConversationIds.add(sourceConversationId)
  const controller = new AbortController()
  streamControllers.set(sourceConversationId, controller)
  setComposerDisabled(false, sourceConversationId)
  setStatus('')
  try {
    const { raw, stopped } = await streamAssistantResponse(`/api/messages/${encodeURIComponent(msg.id)}/regenerate`, {
      conversationId: sourceConversationId,
      providerId,
      message: { role: 'user', content },
      skillId: activeSkillId,
      stream: true,
    }, bubble, controller.signal, (partial) => {
      pendingAssistant.content = partial
      updateConversationDataCache(sourceConversation, streamMessages)
    })
    pendingAssistant.content = raw
    updateConversationDataCache(sourceConversation, streamMessages)
    if (currentConversation?.id === sourceConversationId) {
      bubble.innerHTML = raw ? renderMarkdown(raw) : '<span style="color:var(--text2);font-style:italic">已停止</span>'
      applySyntaxHighlighting(bubble)
    }
    if (raw) {
      if (currentConversation?.id === sourceConversationId) await refreshConversationDataById(sourceConversationId, { render: true })
      else await refreshConversationDataById(sourceConversationId, { render: false })
    } else if (stopped) {
      streamMessages.pop()
      messages = currentConversation?.id === sourceConversationId ? streamMessages : messages
      updateConversationDataCache(sourceConversation, streamMessages)
      if (currentConversation?.id === sourceConversationId) renderMessages(streamMessages, { scrollMode: 'bottom' })
    }
    loadConversations()
  } catch (err) {
    pendingAssistant.content = err.message
    updateConversationDataCache(sourceConversation, streamMessages)
    if (currentConversation?.id === sourceConversationId) {
      bubble.innerHTML = `<span class="danger">${escHtml(err.message)}</span>`
      applySyntaxHighlighting(bubble)
    }
  } finally {
    streamingConversationIds.delete(sourceConversationId)
    streamControllers.delete(sourceConversationId)
    setComposerDisabled(isConversationLoading)
  }
}

function hasEditableContent(content) {
  if (typeof content === 'string') return content.trim().length > 0
  if (!Array.isArray(content)) return Boolean(content)
  return content.some((part) => {
    if (part.type === 'text') return String(part.text || '').trim().length > 0
    if (part.type === 'image_url') return Boolean(part.image_url?.url)
    return false
  })
}

function serializeMessageContent(content) {
  if (typeof content === 'string') return content
  if (Array.isArray(content)) {
    return content.map((part) => {
      if (part?.type === 'text') return String(part.text || '')
      if (part?.type === 'image_url') return `![${part.alt_text || ''}](${part.image_url?.url || ''})`
      return ''
    }).filter(Boolean).join('\n\n')
  }
  if (content && typeof content === 'object') return JSON.stringify(content, null, 2)
  return String(content || '')
}

function createImagePlaceholderUrl(id) {
  return `litechat-image://${id}`
}

function parseDataUrlMediaType(dataUrl) {
  const match = String(dataUrl || '').match(/^data:([^;,]+)[;,]/i)
  return match?.[1] || 'image/png'
}

function registerPastedImage({ alt = '', dataUrl = '' } = {}) {
  const id = crypto.randomUUID()
  pastedImageRegistry.set(id, {
    alt: String(alt || '').trim(),
    dataUrl: String(dataUrl || ''),
    mediaType: parseDataUrlMediaType(dataUrl),
  })
  return createImagePlaceholderUrl(id)
}

function looksLikeMarkdown(text) {
  const value = String(text || '')
  return /(^|\n)\s{0,3}(#{1,6}\s|>\s|[-*+]\s|\d+\.\s|```|\|.+\|)|!\[[^\]]*]\([^)]+\)|\[[^\]]+]\([^)]+\)/m.test(value)
}

function normalizeMarkdownSpacing(text) {
  return String(text || '')
    .replace(/\r\n?/g, '\n')
    .replace(/[ \t]+\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim()
}

function prefixLines(text, prefix) {
  return String(text || '')
    .split('\n')
    .map((line) => `${prefix}${line}`)
    .join('\n')
}

function renderHtmlNodesToMarkdown(nodes, options = {}) {
  return nodes.map((node) => renderHtmlNodeToMarkdown(node, options)).join(options.inline ? '' : '')
}

function tableToMarkdown(table) {
  const rows = Array.from(table.querySelectorAll('tr'))
    .map((row) => Array.from(row.children)
      .filter((cell) => ['TH', 'TD'].includes(cell.tagName))
      .map((cell) => normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(cell.childNodes), { inline: true }).replace(/\n+/g, ' '))))
    .filter((cells) => cells.length)

  if (!rows.length) return ''
  const columnCount = rows.reduce((max, row) => Math.max(max, row.length), 0)
  const normalizedRows = rows.map((row) => {
    const next = row.slice()
    while (next.length < columnCount) next.push('')
    return next
  })
  const header = normalizedRows[0]
  const divider = new Array(columnCount).fill('---')
  return [
    `| ${header.join(' | ')} |`,
    `| ${divider.join(' | ')} |`,
    ...normalizedRows.slice(1).map((row) => `| ${row.join(' | ')} |`),
  ].join('\n')
}

function renderHtmlNodeToMarkdown(node, options = {}) {
  if (!node) return ''
  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent || ''
    return options.preserveWhitespace ? text : text.replace(/\s+/g, ' ')
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return ''

  const tag = node.tagName.toLowerCase()
  if (tag === 'script' || tag === 'style' || tag === 'noscript') return ''
  if (tag === 'br') return '\n'
  if (tag === 'hr') return '\n---\n'
  if (tag === 'img') {
    const alt = node.getAttribute('alt') || ''
    const src = node.getAttribute('src') || node.getAttribute('data-src') || ''
    if (src.startsWith('data:image/')) {
      const placeholderUrl = registerPastedImage({ alt, dataUrl: src })
      return `![${alt}](${placeholderUrl})`
    }
    return src ? `![${alt}](${src})` : (alt ? `[image: ${alt}]` : '[image]')
  }
  if (tag === 'a') {
    const href = node.getAttribute('href') || ''
    const label = normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(node.childNodes), { inline: true })) || href
    return href ? `[${label}](${href})` : label
  }
  if (tag === 'code' && node.parentElement?.tagName !== 'PRE') {
    const code = node.textContent || ''
    return `\`${code.replace(/`/g, '\\`')}\``
  }
  if (tag === 'pre') {
    const code = (node.textContent || '').trimEnd()
    return code ? `\n\`\`\`\n${code}\n\`\`\`\n` : ''
  }
  if (tag === 'table') {
    const markdownTable = tableToMarkdown(node)
    return markdownTable ? `\n${markdownTable}\n` : ''
  }
  if (tag === 'blockquote') {
    const text = normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(node.childNodes), { block: true }))
    return text ? `\n${prefixLines(text, '> ')}\n` : ''
  }
  if (tag === 'ul' || tag === 'ol') {
    const items = Array.from(node.children)
      .filter((child) => child.tagName === 'LI')
      .map((child, index) => {
        const prefix = tag === 'ol' ? `${index + 1}. ` : '- '
        const text = normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(child.childNodes), { block: true }))
        return text ? `${prefix}${text.replace(/\n/g, `\n${' '.repeat(prefix.length)}`)}` : ''
      })
      .filter(Boolean)
    return items.length ? `\n${items.join('\n')}\n` : ''
  }
  if (/^h[1-6]$/.test(tag)) {
    const level = Number(tag.slice(1))
    const text = normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(node.childNodes), { inline: true }))
    return text ? `\n${'#'.repeat(level)} ${text}\n` : ''
  }
  if (tag === 'p' || tag === 'div' || tag === 'section' || tag === 'article' || tag === 'header' || tag === 'footer') {
    const text = normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(node.childNodes), { block: true }))
    return text ? `\n${text}\n` : ''
  }

  return renderHtmlNodesToMarkdown(Array.from(node.childNodes), options)
}

function htmlToMarkdown(html) {
  try {
    const doc = new DOMParser().parseFromString(String(html || ''), 'text/html')
    return normalizeMarkdownSpacing(renderHtmlNodesToMarkdown(Array.from(doc.body.childNodes), { block: true }))
  } catch {
    return ''
  }
}

function clipboardToComposerText(clipboardData) {
  const plainText = String(clipboardData?.getData('text/plain') || '')
  const html = String(clipboardData?.getData('text/html') || '')
  if (plainText.trim() && looksLikeMarkdown(plainText)) return plainText
  if (html.trim()) {
    const markdown = htmlToMarkdown(html)
    if (markdown) return markdown
  }
  return plainText
}

function dataUrlToContentPart(dataUrl, altText = '') {
  return {
    type: 'image_url',
    alt_text: String(altText || '').trim(),
    image_url: {
      url: String(dataUrl || ''),
      media_type: parseDataUrlMediaType(dataUrl),
    },
  }
}

function imageMarkdownToContentPart(altText, rawUrl) {
  const url = String(rawUrl || '').trim()
  if (!url) return null
  const placeholderMatch = url.match(/^litechat-image:\/\/(.+)$/)
  if (placeholderMatch) {
    const cached = pastedImageRegistry.get(placeholderMatch[1])
    if (!cached?.dataUrl) return null
    return dataUrlToContentPart(cached.dataUrl, altText || cached.alt)
  }
  if (url.startsWith('data:image/')) return dataUrlToContentPart(url, altText)
  return {
    type: 'image_url',
    alt_text: String(altText || '').trim(),
    image_url: {
      url,
    },
  }
}

function buildMessageContentFromMarkdown(source) {
  const text = String(source || '')
  const imagePattern = /!\[([^\]]*)\]\(([^)]+)\)/g
  const parts = []
  let lastIndex = 0
  for (const match of text.matchAll(imagePattern)) {
    const [full, altText, rawUrl] = match
    const index = match.index ?? 0
    const before = text.slice(lastIndex, index)
    if (before) parts.push({ type: 'text', text: before })
    const imagePart = imageMarkdownToContentPart(altText, rawUrl)
    if (imagePart) parts.push(imagePart)
    else if (full) parts.push({ type: 'text', text: full })
    lastIndex = index + full.length
  }
  const tail = text.slice(lastIndex)
  if (tail) parts.push({ type: 'text', text: tail })

  const normalized = parts
    .filter((part) => part.type !== 'text' || String(part.text || '').length > 0)
    .reduce((acc, part) => {
      if (part.type === 'text' && acc.length && acc.at(-1).type === 'text') {
        acc.at(-1).text += part.text
      } else {
        acc.push(part)
      }
      return acc
    }, [])

  if (!normalized.length) return ''
  return normalized.some((part) => part.type === 'image_url') ? normalized : text
}

function insertTextAtCursor(textarea, text) {
  const value = String(text || '')
  const start = textarea.selectionStart ?? textarea.value.length
  const end = textarea.selectionEnd ?? textarea.value.length
  textarea.setRangeText(value, start, end, 'end')
  textarea.dispatchEvent(new Event('input', { bubbles: true }))
}

function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = () => resolve(String(reader.result || ''))
    reader.onerror = () => reject(reader.error || new Error('读取图片失败'))
    reader.readAsDataURL(file)
  })
}

async function copyMessageContent(button, msg) {
  const raw = serializeMessageContent(msg?.content)
  try {
    await writeClipboardText(raw)
    button.textContent = '✓'
    setTimeout(() => { button.textContent = '⧉' }, 1200)
  } catch {
    button.textContent = '!'
    setTimeout(() => { button.textContent = '⧉' }, 1200)
  }
}

function toggleSidebar() {
  if (window.innerWidth > 720) {
    toggleSidebarCollapsed()
    return
  }
  const open = refs.sidebar.classList.toggle('open')
  const ov = document.getElementById('sidebar-overlay')
  if (ov) ov.classList.toggle('show', open)
}

function closeSidebar() {
  refs.sidebar.classList.remove('open')
  const ov = document.getElementById('sidebar-overlay')
  if (ov) ov.classList.remove('show')
}

function toggleSidebarCollapsed() {
  sidebarCollapsed = !sidebarCollapsed
  LS.set('sidebarCollapsed', sidebarCollapsed)
  updateSidebarCollapsedUI()
}

function stopCurrentConversationStream() {
  const conversationId = currentConversation?.id
  if (!conversationId) return
  const controller = streamControllers.get(conversationId)
  if (controller) controller.abort()
}


async function copyCode(btn) {
  const code = btn.nextElementSibling?.innerText || ''
  try {
    await writeClipboardText(code)
    btn.textContent = '已复制'
    setTimeout(() => { btn.textContent = '复制' }, 1200)
  } catch {
    btn.textContent = '复制失败'
    setTimeout(() => { btn.textContent = '复制' }, 1200)
  }
}

async function writeClipboardText(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text)
    return
  }
  const textarea = document.createElement('textarea')
  textarea.value = text
  textarea.setAttribute('readonly', '')
  textarea.style.position = 'fixed'
  textarea.style.left = '-9999px'
  textarea.style.top = '0'
  document.body.appendChild(textarea)
  textarea.select()
  const ok = document.execCommand('copy')
  document.body.removeChild(textarea)
  if (!ok) throw new Error('Copy failed')
}

function escHtml(value) {
  return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}
function escAttr(value) {
  return escHtml(value).replace(/'/g, '&#39;')
}

$('logout-btn').onclick = async () => {
  try { await api('/api/auth/logout', { method: 'POST' }) } catch {}
  LS.del('authToken')
  LS.del('activeConversationId')
  location.reload()
}
$('new-chat-btn').onclick = newConversation
$('admin-btn').onclick = () => { location.href = '/admin.html' }
$('code-review-btn').onclick = () => { location.href = '/code-review.html' }
if (refs.openAuthBtn) refs.openAuthBtn.onclick = () => openAuthModal('登录后可保存会话并继续对话')
if (refs.authClose) refs.authClose.onclick = () => closeAuthModal()
refs.skillBtn.onclick = (event) => {
  event.stopPropagation()
  refs.skillPicker.classList.toggle('hidden')
}
refs.skillPicker.onclick = (event) => event.stopPropagation()
$('toggle-sidebar').onclick = () => toggleSidebar()
if ($('close-sidebar')) $('close-sidebar').onclick = () => closeSidebar()
document.getElementById('sidebar-overlay').onclick = closeSidebar
$('send-btn').onclick = () => {
  if (streamingConversationIds.has(currentConversation?.id)) stopCurrentConversationStream()
  else sendMessage()
}
refs.input.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage() }
})
refs.input.addEventListener('input', () => {
  refs.input.style.height = 'auto'
  refs.input.style.height = Math.min(refs.input.scrollHeight, 200) + 'px'
})
refs.input.addEventListener('paste', async (event) => {
  const clipboardText = clipboardToComposerText(event.clipboardData)
  const imageFiles = Array.from(event.clipboardData?.items || [])
    .filter((item) => item.type.startsWith('image/'))
    .map((item) => item.getAsFile())
    .filter(Boolean)
  if (!clipboardText && !imageFiles.length) return
  event.preventDefault()
  if (clipboardText) insertTextAtCursor(refs.input, clipboardText)
  const alreadyHasMarkdownImages = /!\[[^\]]*]\([^)]+\)/.test(clipboardText)
  if (imageFiles.length && (!clipboardText || !alreadyHasMarkdownImages)) {
    const placeholders = await Promise.all(imageFiles.map(async (file) => {
      const dataUrl = await readAsDataURL(file)
      const placeholderUrl = registerPastedImage({ alt: file.name || '', dataUrl })
      return `![${file.name || 'image'}](${placeholderUrl})`
    }))
    const prefix = clipboardText ? '\n\n' : ''
    insertTextAtCursor(refs.input, `${prefix}${placeholders.join('\n\n')}`)
  }
})
document.addEventListener('click', () => refs.skillPicker.classList.add('hidden'))
window.addEventListener('resize', updateSidebarCollapsedUI)
$('sys-prompt-btn').onclick = () => {
  refs.sysInput.value = currentConversation?.systemPrompt || ''
  refs.sysModal.classList.add('open')
}
$('sys-cancel').onclick = () => refs.sysModal.classList.remove('open')
$('sys-save').onclick = async () => {
  if (!currentConversation) await newConversation()
  if (isDraftConversation()) {
    try {
      await ensureConversationPersisted()
    } catch (err) {
      return setStatus(err.message || '新对话创建失败，请重试')
    }
  }
  const systemPrompt = refs.sysInput.value.trim()
  const data = await api(`/api/conversations/${currentConversation.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ systemPrompt }),
  })
  currentConversation = data.conversation
  updateConversationDataCache()
  refs.sysModal.classList.remove('open')
}
refs.sysModal.addEventListener('click', (event) => { if (event.target === refs.sysModal) refs.sysModal.classList.remove('open') })
refs.authScreen.addEventListener('click', (event) => {
  if (event.target === refs.authScreen) closeAuthModal()
})

;(async function init() {
  if (!authToken) {
    await enterGuestApp()
    return
  }
  try {
    const data = await api('/api/auth/me')
    currentUser = data.user
    await enterApp()
  } catch {
    LS.del('authToken')
    authToken = ''
    await enterGuestApp()
  }
})()
