<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lite Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #252525; --border: #333;
    --accent: #7c6aff; --accent2: #a78bfa; --text: #e5e5e5; --text2: #999;
    --user-bg: #2a2250; --ai-bg: #171717; --danger: #ef4444; --ok: #22c55e;
    --sidebar-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }
  .hidden { display: none !important; }

  #auth-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .auth-box { width: min(420px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: grid; gap: 16px; }
  .auth-title { color: var(--accent2); font-size: 24px; font-weight: 800; }
  .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 8px; padding: 4px; }
  .tab { border: 0; background: transparent; color: var(--text2); padding: 9px; border-radius: 6px; }
  .tab.active { background: var(--accent); color: white; }
  .form { display: grid; gap: 10px; }
  .field { display: grid; gap: 6px; }
  label { color: var(--text2); font-size: 12px; }
  .input, select, textarea { width: 100%; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; }
  .input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .primary { background: var(--accent); color: white; border: 0; border-radius: 8px; padding: 10px 14px; }
  .secondary { background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
  .danger { color: var(--danger); }
  #auth-status, #status { min-height: 18px; color: var(--danger); font-size: 13px; }

  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); gap: 8px; }
  .sidebar-title { color: var(--accent2); font-weight: 800; }
  #new-chat-btn { white-space: nowrap; }
  #conversation-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conversation { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; color: var(--text2); }
  .conversation:hover { background: var(--surface2); color: var(--text); }
  .conversation.active { background: var(--user-bg); color: var(--accent2); }
  .conversation-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .icon-btn { background: transparent; color: var(--text2); border: 0; border-radius: 6px; padding: 5px 7px; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  #settings-panel { border-top: 1px solid var(--border); padding: 12px; display: grid; gap: 9px; }
  .settings-row { display: flex; gap: 8px; }
  .settings-row select { min-width: 0; flex: 1; }
  #user-line { color: var(--text2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #topbar { height: 52px; display: flex; align-items: center; gap: 10px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #chat-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 650; }
  #messages { flex: 1; overflow-y: auto; padding: 24px 0; }
  #empty-state { height: 100%; display: grid; place-items: center; color: var(--text2); }
  .msg-row { max-width: 820px; margin: 0 auto 8px; padding: 0 20px; display: flex; flex-direction: column; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.assistant { align-items: flex-start; }
  .msg-label { font-size: 11px; color: var(--text2); margin: 0 4px 4px; }
  .bubble { max-width: 90%; padding: 12px 16px; border-radius: 16px; line-height: 1.65; font-size: 14.5px; word-break: break-word; }
  .user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble img { max-width: 100%; max-height: 320px; display: block; border-radius: 10px; margin: 6px 0; }
  .bubble p { margin: 0 0 .6em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble pre { background: #161616; border: 1px solid var(--border); border-radius: 10px; padding: 14px; overflow-x: auto; margin: .6em 0; position: relative; }
  .bubble code:not(pre code) { background: #2d2d2d; border-radius: 4px; padding: 2px 5px; color: #e2b96b; }
  .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 5px; }
  .cursor { display: inline-block; width: 8px; height: 1em; background: var(--accent2); animation: blink .8s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }

  #image-previews { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px 0; max-width: 820px; margin: 0 auto; width: 100%; }
  .img-preview-wrap { position: relative; width: 72px; height: 72px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .remove-img { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 50%; border: 0; background: rgba(0,0,0,.75); color: white; }

  #input-bar { border-top: 1px solid var(--border); padding: 12px 16px 16px; }
  #input-wrap { max-width: 820px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; }
  #msg-input { background: transparent; border: 0; color: var(--text); resize: none; padding: 14px 16px 6px; min-height: 56px; max-height: 200px; outline: none; }
  #input-actions { display: flex; align-items: center; gap: 6px; padding: 6px 10px 10px; }
  #send-btn { margin-left: auto; width: 36px; height: 36px; border-radius: 10px; border: 0; background: var(--accent); color: white; font-size: 18px; }
  #send-btn:disabled { opacity: .45; cursor: not-allowed; }
  .hint { color: var(--text2); font-size: 11px; text-align: center; margin-top: 6px; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 20; align-items: center; justify-content: center; padding: 16px; }
  .modal.open { display: flex; }
  .modal-box { width: min(520px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: grid; gap: 12px; }
  .modal-title { font-size: 16px; font-weight: 800; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

  @media (max-width: 720px) {
    #sidebar { position: fixed; inset: 0 auto 0 0; transform: translateX(-100%); transition: transform .18s; z-index: 10; box-shadow: 4px 0 24px rgba(0,0,0,.4); }
    #sidebar.open { transform: translateX(0); }
    .bubble { max-width: 96%; }
    #topbar { padding: 0 10px; }
  }
</style>
</head>
<body>
<section id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">Lite Chat</div>
    <div class="tabs">
      <button class="tab active" id="login-tab">登录</button>
      <button class="tab" id="register-tab">注册</button>
    </div>
    <form class="form" id="auth-form">
      <div class="field"><label>邮箱</label><input class="input" id="auth-email" type="email" autocomplete="email" required /></div>
      <div class="field hidden" id="name-field"><label>显示名</label><input class="input" id="auth-name" type="text" autocomplete="name" /></div>
      <div class="field"><label>密码</label><input class="input" id="auth-password" type="password" autocomplete="current-password" required /></div>
      <button class="primary" id="auth-submit" type="submit">登录</button>
      <div id="auth-status"></div>
    </form>
  </div>
</section>

<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Lite Chat</span>
      <button class="secondary" id="new-chat-btn">新对话</button>
    </div>
    <div id="conversation-list"></div>
    <div id="settings-panel">
      <div id="user-line"></div>
      <label>Provider</label>
      <div class="settings-row">
        <select id="provider-select"></select>
        <button class="secondary" id="provider-edit-btn">编辑</button>
      </div>
      <button class="secondary" id="provider-new-btn">添加 Provider</button>
      <label>模型</label>
      <select id="model-select"><option value="">选择 Provider 后加载</option></select>
      <button class="secondary" id="logout-btn">退出登录</button>
      <div id="status"></div>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <button class="icon-btn" id="toggle-sidebar" title="侧栏">☰</button>
      <span id="chat-title">新对话</span>
      <button class="secondary" id="sys-prompt-btn">系统提示</button>
    </div>
    <div id="messages"><div id="empty-state">选择 Provider 和模型，开始对话</div></div>
    <div id="image-previews"></div>
    <div id="input-bar">
      <div id="input-wrap">
        <textarea id="msg-input" rows="1" placeholder="输入消息，Shift+Enter 换行，支持粘贴图片"></textarea>
        <div id="input-actions">
          <button class="icon-btn" id="upload-btn" title="上传图片">🖼</button>
          <input type="file" id="file-input" accept="image/*" multiple hidden />
          <button class="icon-btn danger" id="clear-btn" title="删除对话">🗑</button>
          <button id="send-btn" title="发送">↑</button>
        </div>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </main>
</div>

<div class="modal" id="sys-modal">
  <div class="modal-box">
    <div class="modal-title">系统提示词</div>
    <textarea id="sys-prompt-input" rows="6" placeholder="你是一个有用的助手"></textarea>
    <div class="modal-actions">
      <button class="secondary" id="sys-cancel">取消</button>
      <button class="primary" id="sys-save">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="provider-modal">
  <form class="modal-box" id="provider-form">
    <div class="modal-title" id="provider-modal-title">Provider</div>
    <div class="field"><label>名称</label><input class="input" id="provider-name" required /></div>
    <div class="field"><label>Base URL</label><input class="input" id="provider-base-url" placeholder="http://localhost:11434" required /></div>
    <div class="field"><label>API Key</label><input class="input" id="provider-api-key" type="password" placeholder="留空保持不变，输入新值替换" /></div>
    <div class="field"><label>默认模型</label><input class="input" id="provider-default-model" /></div>
    <div class="field"><label><input id="provider-is-default" type="checkbox" /> 设为默认 Provider</label></div>
    <div class="modal-actions">
      <button class="secondary" id="provider-cancel" type="button">取消</button>
      <button class="primary" type="submit">保存</button>
    </div>
  </form>
</div>

<script>
const LS = {
  get: (key, fallback) => { try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v) } catch { return fallback } },
  set: (key, value) => localStorage.setItem(key, JSON.stringify(value)),
  del: (key) => localStorage.removeItem(key),
}

marked.setOptions({ breaks: true, gfm: true })
const renderer = new marked.Renderer()
renderer.code = ({ text, lang }) => {
  const highlighted = lang && hljs.getLanguage(lang) ? hljs.highlight(text, { language: lang }).value : hljs.highlightAuto(text).value
  return `<pre><button class="copy-btn" onclick="copyCode(this)">复制</button><code class="hljs language-${escAttr(lang || '')}">${highlighted}</code></pre>`
}
marked.use({ renderer })

let authToken = LS.get('authToken', '')
let currentUser = null
let providers = []
let conversations = []
let currentConversation = null
let messages = []
let pendingImages = []
let isStreaming = false
let authMode = 'login'
let editingProviderId = null

const $ = (id) => document.getElementById(id)
const refs = {
  authScreen: $('auth-screen'), app: $('app'), authForm: $('auth-form'), authStatus: $('auth-status'),
  loginTab: $('login-tab'), registerTab: $('register-tab'), nameField: $('name-field'), authSubmit: $('auth-submit'),
  list: $('conversation-list'), title: $('chat-title'), messages: $('messages'), input: $('msg-input'),
  send: $('send-btn'), previews: $('image-previews'), providerSelect: $('provider-select'), model: $('model-select'),
  status: $('status'), userLine: $('user-line'), sidebar: $('sidebar'), sysModal: $('sys-modal'),
  sysInput: $('sys-prompt-input'), providerModal: $('provider-modal'), providerForm: $('provider-form'),
}

async function api(path, options = {}) {
  const headers = { ...(options.headers || {}) }
  const isForm = options.body instanceof FormData
  if (!isForm) headers['Content-Type'] = 'application/json'
  if (authToken) headers.Authorization = `Bearer ${authToken}`
  const res = await fetch(path, { ...options, headers })
  if (!res.ok) {
    let message = `HTTP ${res.status}`
    try { message = (await res.json()).error || message } catch {}
    throw new Error(message)
  }
  if (res.status === 204) return null
  return res.json()
}

function setStatus(text, danger = true) {
  refs.status.textContent = text || ''
  refs.status.style.color = danger ? 'var(--danger)' : 'var(--ok)'
}

function setAuthMode(mode) {
  authMode = mode
  refs.loginTab.classList.toggle('active', mode === 'login')
  refs.registerTab.classList.toggle('active', mode === 'register')
  refs.nameField.classList.toggle('hidden', mode === 'login')
  refs.authSubmit.textContent = mode === 'login' ? '登录' : '创建账号'
  refs.authStatus.textContent = ''
}

refs.loginTab.onclick = () => setAuthMode('login')
refs.registerTab.onclick = () => setAuthMode('register')

refs.authForm.onsubmit = async (event) => {
  event.preventDefault()
  refs.authStatus.textContent = ''
  const body = {
    email: $('auth-email').value.trim(),
    password: $('auth-password').value,
    displayName: $('auth-name').value.trim(),
  }
  try {
    const data = await api(`/api/auth/${authMode}`, { method: 'POST', body: JSON.stringify(body) })
    authToken = data.token
    currentUser = data.user
    LS.set('authToken', authToken)
    await enterApp()
  } catch (err) {
    refs.authStatus.textContent = err.message
  }
}

async function enterApp() {
  refs.authScreen.classList.add('hidden')
  refs.app.classList.remove('hidden')
  refs.userLine.textContent = currentUser?.email || ''
  await Promise.all([loadProviders(), loadConversations(), loadSettings()])
  const activeId = LS.get('activeConversationId', null)
  if (activeId && conversations.some((c) => c.id === activeId)) await switchConversation(activeId)
  else if (conversations[0]) await switchConversation(conversations[0].id)
  else renderMessages([])
}

async function loadSettings() {
  try { await api('/api/settings') } catch {}
}

async function loadProviders() {
  const data = await api('/api/providers')
  providers = data.providers || []
  refs.providerSelect.innerHTML = providers.length
    ? providers.map((p) => `<option value="${escAttr(p.id)}">${escHtml(p.name)}${p.isDefault ? ' *' : ''}</option>`).join('')
    : '<option value="">没有 Provider</option>'
  const saved = LS.get('activeProviderId', '')
  const selected = providers.find((p) => p.id === saved) || providers.find((p) => p.isDefault) || providers[0]
  if (selected) refs.providerSelect.value = selected.id
  await loadModels()
}

async function loadModels() {
  const providerId = refs.providerSelect.value
  refs.model.innerHTML = '<option value="">加载中...</option>'
  if (!providerId) {
    refs.model.innerHTML = '<option value="">请先添加 Provider</option>'
    return
  }
  LS.set('activeProviderId', providerId)
  try {
    const { models } = await api(`/api/providers/${providerId}/models`)
    const provider = providers.find((p) => p.id === providerId)
    const preferred = LS.get('lastModel', '') || provider?.defaultModel || currentConversation?.model || ''
    refs.model.innerHTML = (models || []).map((m) => `<option value="${escAttr(m)}"${m === preferred ? ' selected' : ''}>${escHtml(m)}</option>`).join('')
    if (!refs.model.innerHTML) refs.model.innerHTML = '<option value="">没有可用模型</option>'
  } catch (err) {
    refs.model.innerHTML = '<option value="">模型加载失败</option>'
    setStatus(err.message)
  }
}

async function loadConversations() {
  const data = await api('/api/conversations')
  conversations = data.conversations || []
  renderSidebar()
}

function renderSidebar() {
  refs.list.innerHTML = ''
  for (const c of conversations) {
    const row = document.createElement('div')
    row.className = `conversation${currentConversation?.id === c.id ? ' active' : ''}`
    row.innerHTML = `<span class="conversation-title">${escHtml(c.title)}</span><button class="icon-btn danger" title="删除">✕</button>`
    row.querySelector('.conversation-title').onclick = () => switchConversation(c.id)
    row.querySelector('button').onclick = async (event) => {
      event.stopPropagation()
      if (!confirm('删除该对话？')) return
      await api(`/api/conversations/${c.id}`, { method: 'DELETE' })
      if (currentConversation?.id === c.id) {
        currentConversation = null
        messages = []
        refs.title.textContent = '新对话'
        LS.del('activeConversationId')
        renderMessages([])
      }
      await loadConversations()
    }
    refs.list.appendChild(row)
  }
}

async function newConversation() {
  const providerId = refs.providerSelect.value || null
  const model = refs.model.value || null
  const data = await api('/api/conversations', {
    method: 'POST',
    body: JSON.stringify({ title: '新对话', providerId, model }),
  })
  await loadConversations()
  await switchConversation(data.conversation.id)
}

async function switchConversation(id) {
  const data = await api(`/api/conversations/${id}`)
  currentConversation = data.conversation
  messages = data.messages || []
  refs.title.textContent = currentConversation.title || '新对话'
  LS.set('activeConversationId', id)
  if (currentConversation.providerId) refs.providerSelect.value = currentConversation.providerId
  if (currentConversation.model) refs.model.value = currentConversation.model
  renderSidebar()
  renderMessages(messages)
  if (window.innerWidth <= 720) refs.sidebar.classList.remove('open')
}

function renderMessages(items) {
  refs.messages.innerHTML = ''
  if (!items.length) {
    refs.messages.innerHTML = '<div id="empty-state">选择 Provider 和模型，开始对话</div>'
    return
  }
  for (const msg of items) appendMessage(msg, false)
  scrollToBottom()
}

function appendMessage(msg, scroll = true) {
  const row = document.createElement('div')
  row.className = `msg-row ${msg.role}`
  const label = document.createElement('div')
  label.className = 'msg-label'
  label.textContent = msg.role === 'user' ? '你' : '助手'
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  if (msg.role === 'user') {
    bubble.innerHTML = renderUserContent(msg.content)
  } else {
    bubble.innerHTML = marked.parse(String(msg.content || ''))
  }
  row.append(label, bubble)
  refs.messages.appendChild(row)
  if (scroll) scrollToBottom()
  return bubble
}

function renderUserContent(content) {
  if (!Array.isArray(content)) return `<p>${escHtml(content || '')}</p>`
  return content.map((part) => {
    if (part.type === 'text') return `<p>${escHtml(part.text || '')}</p>`
    if (part.type === 'image_url') return `<img src="${escAttr(part.image_url?.url || '')}" />`
    return ''
  }).join('')
}

function scrollToBottom() {
  refs.messages.scrollTo({ top: refs.messages.scrollHeight, behavior: 'smooth' })
}

async function sendMessage() {
  if (isStreaming) return
  const text = refs.input.value.trim()
  if (!text && !pendingImages.length) return
  if (!refs.providerSelect.value) return setStatus('请先添加 Provider')
  if (!refs.model.value) return setStatus('请先选择模型')
  if (!currentConversation) await newConversation()

  let content = text
  if (pendingImages.length) {
    content = []
    if (text) content.push({ type: 'text', text })
    for (const img of pendingImages) content.push({ type: 'image_url', image_url: { url: img.serverUrl } })
  }

  const userMsg = { role: 'user', content }
  appendMessage(userMsg)
  refs.input.value = ''
  refs.input.style.height = ''
  pendingImages = []
  renderImagePreviews()

  const assistantMsg = { role: 'assistant', content: '' }
  const bubble = appendMessage(assistantMsg)
  bubble.innerHTML = '<span style="color:var(--text2);font-style:italic">思考中</span><span class="cursor"></span>'

  isStreaming = true
  refs.send.disabled = true
  setStatus('')
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
      body: JSON.stringify({
        conversationId: currentConversation.id,
        providerId: refs.providerSelect.value,
        model: refs.model.value,
        message: { role: 'user', content },
        stream: true,
      }),
    })
    if (!res.ok) {
      let message = `HTTP ${res.status}`
      try { message = (await res.json()).error || message } catch {}
      throw new Error(message)
    }
    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''
    let raw = ''
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const payload = line.slice(6).trim()
        if (!payload || payload === '[DONE]') continue
        try {
          const chunk = JSON.parse(payload)
          raw += chunk.choices?.[0]?.delta?.content || ''
          bubble.innerHTML = marked.parse(raw) + '<span class="cursor"></span>'
          scrollToBottom()
        } catch {}
      }
    }
    bubble.innerHTML = marked.parse(raw)
    LS.set('lastModel', refs.model.value)
    await loadConversations()
    await switchConversation(currentConversation.id)
  } catch (err) {
    bubble.innerHTML = `<span class="danger">${escHtml(err.message)}</span>`
  } finally {
    isStreaming = false
    refs.send.disabled = false
  }
}

async function uploadImage(file) {
  const fd = new FormData()
  fd.append('file', file)
  const json = await api('/api/upload', { method: 'POST', body: fd })
  return json.url
}

async function addImageFile(file) {
  const dataUrl = await readAsDataURL(file)
  const serverUrl = await uploadImage(file)
  pendingImages.push({ dataUrl, serverUrl })
  renderImagePreviews()
}

function renderImagePreviews() {
  refs.previews.innerHTML = ''
  pendingImages.forEach((img, index) => {
    const wrap = document.createElement('div')
    wrap.className = 'img-preview-wrap'
    wrap.innerHTML = `<img src="${escAttr(img.dataUrl)}" /><button class="remove-img">×</button>`
    wrap.querySelector('button').onclick = () => { pendingImages.splice(index, 1); renderImagePreviews() }
    refs.previews.appendChild(wrap)
  })
}

function readAsDataURL(file) {
  return new Promise((resolve) => {
    const reader = new FileReader()
    reader.onload = (event) => resolve(event.target.result)
    reader.readAsDataURL(file)
  })
}

function openProviderModal(provider = null) {
  editingProviderId = provider?.id || null
  $('provider-modal-title').textContent = provider ? '编辑 Provider' : '添加 Provider'
  $('provider-name').value = provider?.name || ''
  $('provider-base-url').value = provider?.baseUrl || 'http://localhost:11434'
  $('provider-api-key').value = ''
  $('provider-default-model').value = provider?.defaultModel || ''
  $('provider-is-default').checked = Boolean(provider?.isDefault)
  refs.providerModal.classList.add('open')
}

refs.providerForm.onsubmit = async (event) => {
  event.preventDefault()
  const body = {
    name: $('provider-name').value.trim(),
    baseUrl: $('provider-base-url').value.trim(),
    defaultModel: $('provider-default-model').value.trim(),
    isDefault: $('provider-is-default').checked,
  }
  const apiKey = $('provider-api-key').value.trim()
  if (apiKey || !editingProviderId) body.apiKey = apiKey
  const path = editingProviderId ? `/api/providers/${editingProviderId}` : '/api/providers'
  const method = editingProviderId ? 'PATCH' : 'POST'
  await api(path, { method, body: JSON.stringify(body) })
  refs.providerModal.classList.remove('open')
  await loadProviders()
}

function copyCode(btn) {
  navigator.clipboard.writeText(btn.nextElementSibling.innerText).then(() => {
    btn.textContent = '已复制'
    setTimeout(() => { btn.textContent = '复制' }, 1200)
  })
}

function escHtml(value) {
  return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}
function escAttr(value) {
  return escHtml(value).replace(/'/g, '&#39;')
}

$('logout-btn').onclick = async () => {
  try { await api('/api/auth/logout', { method: 'POST' }) } catch {}
  LS.del('authToken')
  LS.del('activeConversationId')
  LS.del('activeProviderId')
  location.reload()
}
$('new-chat-btn').onclick = newConversation
$('provider-new-btn').onclick = () => openProviderModal()
$('provider-edit-btn').onclick = () => openProviderModal(providers.find((p) => p.id === refs.providerSelect.value))
$('provider-cancel').onclick = () => refs.providerModal.classList.remove('open')
refs.providerSelect.onchange = loadModels
refs.model.onchange = () => LS.set('lastModel', refs.model.value)
$('toggle-sidebar').onclick = () => refs.sidebar.classList.toggle('open')
$('send-btn').onclick = sendMessage
refs.input.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage() }
})
refs.input.addEventListener('input', () => {
  refs.input.style.height = 'auto'
  refs.input.style.height = Math.min(refs.input.scrollHeight, 200) + 'px'
})
$('upload-btn').onclick = () => $('file-input').click()
$('file-input').onchange = async (event) => {
  for (const file of event.target.files) await addImageFile(file)
  event.target.value = ''
}
document.addEventListener('paste', async (event) => {
  for (const item of Array.from(event.clipboardData?.items || [])) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile()
      if (file) { event.preventDefault(); await addImageFile(file) }
    }
  }
})
$('sys-prompt-btn').onclick = () => {
  refs.sysInput.value = currentConversation?.systemPrompt || ''
  refs.sysModal.classList.add('open')
}
$('sys-cancel').onclick = () => refs.sysModal.classList.remove('open')
$('sys-save').onclick = async () => {
  if (!currentConversation) await newConversation()
  const systemPrompt = refs.sysInput.value.trim()
  const data = await api(`/api/conversations/${currentConversation.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ systemPrompt }),
  })
  currentConversation = data.conversation
  refs.sysModal.classList.remove('open')
}
$('clear-btn').onclick = async () => {
  if (!currentConversation || !confirm('删除当前对话？')) return
  await api(`/api/conversations/${currentConversation.id}`, { method: 'DELETE' })
  currentConversation = null
  messages = []
  refs.title.textContent = '新对话'
  renderMessages([])
  await loadConversations()
}
for (const modal of [refs.sysModal, refs.providerModal]) {
  modal.addEventListener('click', (event) => { if (event.target === modal) modal.classList.remove('open') })
}

;(async function init() {
  if (!authToken) return
  try {
    const data = await api('/api/auth/me')
    currentUser = data.user
    await enterApp()
  } catch {
    LS.del('authToken')
    authToken = ''
  }
})()
</script>
</body>
</html>
