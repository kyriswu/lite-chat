services:
  postgres:
    image: postgres:16-alpine
    container_name: lite-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lite_chat
      POSTGRES_USER: lite_chat
      POSTGRES_PASSWORD: lite_chat_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lite_chat -d lite_chat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
